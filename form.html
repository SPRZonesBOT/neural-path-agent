<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Neural Path 2.0 - Email Report + Subscribe</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: #f1f5f9;
            padding: 20px;
            min-height: 100vh;
        }
        .container {
            max-width: 650px;
            margin: 0 auto;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            padding: 20px;
            box-shadow: 0 25px 45px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.2);
        }
        h1 { font-size: 28px; text-align: center; background: linear-gradient(135deg, #a855f7, #3b82f6); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .sub { text-align: center; font-size: 14px; opacity: 0.8; margin-bottom: 20px; }
        .form-group { margin-bottom: 20px; border-bottom: 1px solid #334155; padding-bottom: 15px; }
        label.main-label { display: block; font-weight: 700; margin-bottom: 8px; font-size: 14px; letter-spacing: 0.5px; color: #cbd5e1; }
        select, input[type="text"], input[type="number"], input[type="email"] { width: 100%; padding: 12px; border-radius: 24px; border: none; background: #334155; color: white; font-size: 14px; outline: none; }
        select[multiple] {
            height: auto;
            min-height: 100px;
            background: #1e293b;
            border-radius: 16px;
            padding: 8px;
        }
        select[multiple] option {
            padding: 8px 12px;
            border-radius: 12px;
            margin: 4px 0;
            background: #334155;
            color: white;
        }
        select[multiple] option:checked {
            background: #a855f7 linear-gradient(0deg, #a855f7, #a855f7);
            color: white;
        }
        .stars { display: flex; gap: 10px; font-size: 32px; cursor: pointer; justify-content: center; margin: 10px 0; }
        .star { color: #475569; transition: 0.1s; }
        .star.selected { color: #fbbf24; text-shadow: 0 0 4px gold; }
        button { width: 100%; padding: 14px; background: linear-gradient(135deg, #a855f7, #3b82f6); border: none; border-radius: 40px; font-size: 18px; font-weight: bold; color: white; cursor: pointer; margin-top: 10px; }
        button:active { transform: scale(0.98); }
        .result { margin-top: 30px; background: #0f172a; border-radius: 24px; padding: 20px; display: none; }
        .result h3 { color: #c084fc; margin-top: 20px; border-left: 4px solid #c084fc; padding-left: 12px; }
        .swot-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 10px;
        }
        .swot-card {
            background: #1e293b;
            border-radius: 20px;
            padding: 12px;
            border-top: 4px solid;
        }
        .swot-card h4 { margin-bottom: 8px; font-size: 16px; }
        .swot-card p { font-size: 13px; line-height: 1.4; }
        .strength-card { border-color: #22c55e; }
        .weakness-card { border-color: #ef4444; }
        .opportunity-card { border-color: #3b82f6; }
        .threat-card { border-color: #f97316; }
        .loading { display: none; text-align: center; margin-top: 15px; }
        hr { border-color: #334155; margin: 15px 0; }
        .subscribe-btn {
            display: inline-block;
            background: #ff0000;
            color: white;
            padding: 10px 20px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: bold;
            margin-top: 10px;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>🧠 NEURAL PATH 2.0</h1>
    <div class="sub">EMAIL REPORT + SWOT + AI ANALYSIS</div>

    <form id="parentForm">
        <!-- Child Name -->
        <div class="form-group"><label class="main-label">👶 CHILD'S FULL NAME</label><input type="text" id="childName" required placeholder="e.g., Aryan Sharma"></div>
        
        <!-- Age -->
        <div class="form-group"><label class="main-label">1. CHILD'S AGE (YEARS)</label>
            <select id="age" required><option value="">SELECT AGE</option>
            <option>5</option><option>6</option><option>7</option><option>8</option><option>9</option><option>10</option>
            <option>11</option><option>12</option><option>13</option><option>14</option><option>15</option><option>16</option>
            <option>17</option><option>18</option><option>19</option><option>20</option><option>21</option><option>22</option>
            <option>23</option><option>24</option><option>25</option></select>
        </div>

        <!-- Height & Weight -->
        <div class="form-group"><label class="main-label">2. HEIGHT (cm) & WEIGHT (kg)</label>
            <div style="display: flex; gap: 10px;">
                <input type="number" id="height" placeholder="Height (cm)" style="width:50%">
                <input type="number" id="weight" placeholder="Weight (kg)" style="width:50%">
            </div>
        </div>

        <!-- Interests (multiple) -->
        <div class="form-group"><label class="main-label">3. FAVORITE ACTIVITIES / SUBJECTS (SELECT MULTIPLE)</label>
            <select id="interests" multiple size="4">
                <option value="GAMING & COMPUTERS">GAMING & COMPUTERS</option>
                <option value="CODING & PROGRAMMING">CODING & PROGRAMMING</option>
                <option value="DRAWING & DESIGN">DRAWING & DESIGN</option>
                <option value="SPORTS & PHYSICAL">SPORTS & PHYSICAL</option>
                <option value="READING & WRITING">READING & WRITING</option>
                <option value="MATHS & LOGIC">MATHS & LOGIC</option>
                <option value="SCIENCE & EXPERIMENTS">SCIENCE & EXPERIMENTS</option>
                <option value="MUSIC & ARTS">MUSIC & ARTS</option>
                <option value="BUSINESS & MONEY">BUSINESS & MONEY</option>
            </select>
        </div>

        <!-- Extra Curricular -->
        <div class="form-group"><label class="main-label">4. EXTRA CURRICULAR ACTIVITIES (SCHOOL KE ALAAWA)</label>
            <select id="extracurricular" multiple size="4">
                <option value="SPORTS (CRICKET/FOOTBALL)">SPORTS (CRICKET/FOOTBALL)</option>
                <option value="CHESS / BOARD GAMES">CHESS / BOARD GAMES</option>
                <option value="MUSIC / DANCE">MUSIC / DANCE</option>
                <option value="CODING CLUB / ROBOTICS">CODING CLUB / ROBOTICS</option>
                <option value="DEBATE / DRAMA">DEBATE / DRAMA</option>
                <option value="ART & CRAFT">ART & CRAFT</option>
                <option value="VOLUNTEERING / SOCIAL WORK">VOLUNTEERING / SOCIAL WORK</option>
            </select>
        </div>

        <!-- Favorite TV Show -->
        <div class="form-group"><label class="main-label">5. FAVORITE TV SHOW / WEB SERIES / MOVIE</label>
            <input type="text" id="tvshow" placeholder="e.g., The Amazing Race, Shark Tank, Stranger Things">
        </div>

        <!-- Future Target Company -->
        <div class="form-group"><label class="main-label">6. FUTURE TARGET COMPANY / ORGANIZATION / BUSINESS</label>
            <input type="text" id="targetOrg" placeholder="e.g., Google, ISRO, Tesla, My Own Startup, FIFA">
        </div>

        <!-- Strengths -->
        <div class="form-group"><label class="main-label">7. STRENGTHS (SELECT MULTIPLE)</label>
            <select id="strengths" multiple size="5">
                <option value="PROBLEM SOLVING">PROBLEM SOLVING</option>
                <option value="CREATIVE THINKING">CREATIVE THINKING</option>
                <option value="LEADERSHIP">LEADERSHIP</option>
                <option value="HARD WORKING">HARD WORKING</option>
                <option value="QUICK LEARNER">QUICK LEARNER</option>
                <option value="GOOD MEMORY">GOOD MEMORY</option>
                <option value="TEAM PLAYER">TEAM PLAYER</option>
            </select>
        </div>

        <!-- Weaknesses (simpler word) -->
        <div class="form-group"><label class="main-label">8. WEAKNESSES (SELECT MULTIPLE)</label>
            <select id="weaknesses" multiple size="5">
                <option value="PUBLIC SPEAKING FEAR">PUBLIC SPEAKING FEAR</option>
                <option value="LACK OF DISCIPLINE">LACK OF DISCIPLINE</option>
                <option value="WEAK IN MATHS">WEAK IN MATHS</option>
                <option value="POOR WRITING SKILLS">POOR WRITING SKILLS</option>
                <option value="LOW CONFIDENCE">LOW CONFIDENCE</option>
                <option value="DELAYS TASKS / POSTPONES">DELAYS TASKS / POSTPONES</option>
            </select>
        </div>

        <!-- Mental Condition -->
        <div class="form-group"><label class="main-label">9. MENTAL CONDITION (SELECT MULTIPLE)</label>
            <select id="mental" multiple size="5">
                <option value="ANXIOUS / WORRIED">ANXIOUS / WORRIED</option>
                <option value="LOW CONFIDENCE">LOW CONFIDENCE</option>
                <option value="STRESSED OFTEN">STRESSED OFTEN</option>
                <option value="HAPPY & CALM">HAPPY & CALM</option>
                <option value="SHORT TEMPER">SHORT TEMPER</option>
            </select>
        </div>

        <!-- Physical Health -->
        <div class="form-group"><label class="main-label">10. PHYSICAL HEALTH (SELECT MULTIPLE)</label>
            <select id="physical" multiple size="5">
                <option value="EYE SIGHT ISSUE">EYE SIGHT ISSUE</option>
                <option value="OBESITY / WEIGHT">OBESITY / WEIGHT</option>
                <option value="LOW STAMINA">LOW STAMINA</option>
                <option value="FIT & ACTIVE">FIT & ACTIVE</option>
                <option value="FREQUENT SICKNESS">FREQUENT SICKNESS</option>
            </select>
        </div>

        <!-- Budget -->
        <div class="form-group"><label class="main-label">11. ANNUAL BUDGET FOR CHILD'S EDUCATION & SKILL DEVELOPMENT (₹ PER YEAR)</label>
            <select id="budget" required>
                <option value="">SELECT</option><option value="100000">LESS THAN ₹1 LAKH</option>
                <option value="300000">₹1 LAKH - ₹3 LAKH</option><option value="500000">₹3 LAKH - ₹5 LAKH</option>
                <option value="800000">₹5 LAKH - ₹8 LAKH</option><option value="1200000">₹8 LAKH - ₹12 LAKH</option>
                <option value="2000000">ABOVE ₹12 LAKH</option>
            </select>
        </div>

        <!-- City -->
        <div class="form-group"><label class="main-label">12. CITY / STATE</label><input type="text" id="city" required placeholder="e.g., DELHI, MUMBAI"></div>

        <!-- Long Term Goal -->
        <div class="form-group"><label class="main-label">13. LONG TERM GOAL (SELECT MULTIPLE)</label>
            <select id="goal" multiple size="5">
                <option value="SETTLE ABROAD">SETTLE ABROAD</option>
                <option value="START MY OWN BUSINESS">START MY OWN BUSINESS</option>
                <option value="STABLE GOVERNMENT JOB">STABLE GOVERNMENT JOB</option>
                <option value="HIGH PAYING PRIVATE JOB">HIGH PAYING PRIVATE JOB</option>
                <option value="BECOME A RESEARCHER/SCIENTIST">RESEARCHER/SCIENTIST</option>
            </select>
        </div>

        <!-- Alignment -->
        <div class="form-group"><label class="main-label">14. PARENT'S EXPECTATION VS CHILD'S WISH (1-10)</label>
            <select id="alignment" required><option value="">SELECT</option>
            <option>1</option><option>2</option><option>3</option><option>4</option><option>5</option>
            <option>6</option><option>7</option><option>8</option><option>9</option><option>10</option></select>
        </div>

        <!-- Email Address (New) -->
        <div class="form-group"><label class="main-label">📧 PARENT'S EMAIL (TO RECEIVE REPORT)</label>
            <input type="email" id="parentEmail" placeholder="e.g., parent@example.com" required>
            <div class="instruction" style="font-size:12px; margin-top:4px;">Report will be sent to this email automatically after submission.</div>
        </div>

        <!-- Rating -->
        <div class="form-group"><label class="main-label">⭐ RATE THIS APP (1 TO 5 STARS)</label>
            <div class="stars" id="starRating">
                <span class="star" data-value="1">☆</span><span class="star" data-value="2">☆</span>
                <span class="star" data-value="3">☆</span><span class="star" data-value="4">☆</span><span class="star" data-value="5">☆</span>
            </div>
            <input type="hidden" id="ratingValue" value="0">
        </div>

        <button type="button" onclick="submitAndGenerate()">✨ GENERATE & SEND REPORT ✨</button>
    </form>
    <div class="loading" id="loading">⏳ SENDING REPORT & SAVING DATA...</div>
    <div id="result" class="result"></div>

    <!-- YouTube Subscribe Link (not automatic) -->
    <div style="text-align: center; margin-top: 30px; padding-top: 15px; border-top: 1px solid #334155;">
        <p>🎥 For more career tips and updates:</p>
        <a href="https://www.youtube.com/@ZeeBros1314?sub_confirmation=1" target="_blank" class="subscribe-btn">🔔 SUBSCRIBE TO OUR YOUTUBE CHANNEL</a>
        <p style="font-size:12px; margin-top:8px;">(Clicking will open YouTube – you can subscribe manually)</p>
    </div>
</div>

<script>
    // Helper: get multiple select values
    function getMultipleSelectValues(selectId) {
        let select = document.getElementById(selectId);
        let values = [];
        for(let i = 0; i < select.options.length; i++) {
            if(select.options[i].selected) values.push(select.options[i].value);
        }
        return values.join(", ");
    }

    // Star rating
    let stars = document.querySelectorAll('.star');
    let ratingInput = document.getElementById('ratingValue');
    stars.forEach(star => {
        star.addEventListener('click', function() {
            let value = parseInt(this.getAttribute('data-value'));
            ratingInput.value = value;
            stars.forEach((s, idx) => {
                if(idx < value) { s.innerHTML = '★'; s.classList.add('selected'); }
                else { s.innerHTML = '☆'; s.classList.remove('selected'); }
            });
        });
    });

    // AI Analysis function (same as before but returns full report text)
    function generateAnalysis(childName, age, height, weight, interests, extracurricular, tvshow, targetOrg, strengths, weaknesses, mental, physical, budget, goal, alignment) {
        let careerPath = "";
        if (interests.includes("CODING") || interests.includes("GAMING") || extracurricular.includes("CODING")) careerPath = "AI/ML SOFTWARE ENGINEER";
        else if (interests.includes("DRAWING") || interests.includes("DESIGN")) careerPath = "UI/UX DESIGNER";
        else if (interests.includes("SPORTS") || extracurricular.includes("SPORTS")) {
            if (height && height > 170) careerPath = "PROFESSIONAL ATHLETE / SPORTS MANAGER";
            else careerPath = "SPORTS MANAGEMENT";
        } else if (interests.includes("BUSINESS") || tvshow.toLowerCase().includes("shark tank")) careerPath = "ENTREPRENEUR";
        else if (interests.includes("SCIENCE")) careerPath = "RESEARCH SCIENTIST";
        else careerPath = "DIGITAL MARKETING / GENERAL MANAGEMENT";

        if (targetOrg.toLowerCase().includes("google")) careerPath = "SOFTWARE ENGINEER AT GOOGLE";
        else if (targetOrg.toLowerCase().includes("isro")) careerPath = "AEROSPACE SCIENTIST AT ISRO";
        else if (targetOrg.toLowerCase().includes("tesla")) careerPath = "RENEWABLE ENERGY ENGINEER";
        else if (targetOrg.toLowerCase().includes("startup")) careerPath = "ENTREPRENEUR";

        // SWOT text
        let S = strengths.includes("PROBLEM SOLVING") ? "✅ Analytical & problem-solving. " : "";
        S += strengths.includes("CREATIVE") ? "✅ Creative thinker. " : "";
        if (!S) S = "✅ Basic strengths present.";
        let W = weaknesses.includes("PUBLIC SPEAKING") ? "⚠️ Hesitant in speaking. " : "";
        W += weaknesses.includes("DELAYS TASKS") ? "⚠️ Delays tasks – use timers. " : "";
        if (!W) W = "⚠️ No major weakness.";
        let O = (parseInt(budget)>=500000) ? "💰 Good budget for quality courses. " : "💰 Budget limited – use free resources. ";
        if (tvshow.toLowerCase().includes("shark tank")) O += "📺 Business interest – explore entrepreneurship. ";
        O += "📈 Online certifications & internships available.";
        let T = mental.includes("ANXIOUS") ? "😟 Stress may affect performance. " : "";
        T += physical.includes("EYE SIGHT") ? "👁️ Eye health – consider screen breaks. " : "";
        if (!T) T = "No major threats.";

        let companies = (careerPath.includes("SOFTWARE")) ? "Google, Microsoft, Amazon" : (careerPath.includes("DESIGN") ? "Adobe, Figma" : "Tata, Infosys, Deloitte");
        let personalDev = "Morning routine: 10 min journal + 20 min skill. Use Pomodoro to beat delays.";
        let whatToFollow = (careerPath.includes("AI")) ? "Andrej Karpathy, Kaggle" : "LinkedIn influencers, Coursera guides";

        return { careerPath, S, W, O, T, companies, personalDev, whatToFollow };
    }

    // Google Apps Script URL (replace with your own)
    const SCRIPT_URL = "https://script.google.com/home/projects/1Er_k7ZiDGYl2uI_ffF3U0_oM2by3e9Vq-fy_OA14HyZe0rHHome7BV_B/edit";

    async function submitAndGenerate() {
        // Get all fields
        let childName = document.getElementById('childName').value.trim();
        let age = document.getElementById('age').value;
        let height = document.getElementById('height').value || "Not given";
        let weight = document.getElementById('weight').value || "Not given";
        let interests = getMultipleSelectValues('interests');
        let extracurricular = getMultipleSelectValues('extracurricular');
        let tvshow = document.getElementById('tvshow').value.trim();
        let targetOrg = document.getElementById('targetOrg').value.trim();
        let strengths = getMultipleSelectValues('strengths');
        let weaknesses = getMultipleSelectValues('weaknesses');
        let mental = getMultipleSelectValues('mental');
        let physical = getMultipleSelectValues('physical');
        let budget = document.getElementById('budget').value;
        let city = document.getElementById('city').value.trim();
        let goal = getMultipleSelectValues('goal');
        let alignment = document.getElementById('alignment').value;
        let parentEmail = document.getElementById('parentEmail').value.trim();
        let rating = document.getElementById('ratingValue').value;

        // Validation
        if(!childName || !age || !budget || !city || !alignment || !parentEmail) {
            alert("PLEASE FILL ALL MANDATORY FIELDS (INCLUDING EMAIL)");
            return;
        }
        if(rating == "0") { alert("PLEASE RATE THE APP (1-5 STARS)"); return; }
        if(!interests || !strengths || !weaknesses || !mental || !physical || !goal) {
            alert("PLEASE SELECT AT LEAST ONE OPTION IN EACH MULTIPLE-SELECT FIELD");
            return;
        }

        let analysis = generateAnalysis(childName, age, height, weight, interests, extracurricular, tvshow, targetOrg, strengths, weaknesses, mental, physical, budget, goal, alignment);

        // Skill score
        let skillScore = 50;
        if(strengths.includes("PROBLEM SOLVING")) skillScore += 15;
        if(strengths.includes("CREATIVE")) skillScore += 12;
        if(weaknesses.includes("PUBLIC SPEAKING")) skillScore -= 10;
        if(mental.includes("ANXIOUS")) skillScore -= 12;
        if(weaknesses.includes("DELAYS TASKS")) skillScore -= 8;
        skillScore = Math.min(100, Math.max(20, skillScore));

        // Prepare payload for Google Sheet (including email)
        let payload = {
            timestamp: new Date().toISOString(),
            childName, age, height, weight, interests, extracurricular, tvshow, targetOrg,
            strengths, weaknesses, mental, physical, budget, city, goal, alignment,
            parentEmail, rating, skillScore, careerPath: analysis.careerPath,
            swot_s: analysis.S, swot_w: analysis.W, swot_o: analysis.O, swot_t: analysis.T
        };

        let loadingDiv = document.getElementById('loading');
        let btn = document.querySelector('button');
        loadingDiv.style.display = 'block';
        btn.disabled = true;

        // Send to Google Sheet (and also trigger email via Apps Script)
        if(SCRIPT_URL && SCRIPT_URL !== "YOUR_GOOGLE_SCRIPT_URL") {
            try {
                await fetch(SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
            } catch(e) { console.error("SAVE ERROR", e); }
        } else {
            console.warn("GOOGLE SHEET URL NOT SET. DATA NOT SAVED. EMAIL WILL NOT BE SENT.");
        }

        // Display result on screen (same as before)
        let resultDiv = document.getElementById('result');
        resultDiv.style.display = 'block';
        resultDiv.innerHTML = `
            <h3>🎯 SKILL SCORE: ${skillScore}/100</h3>
            <p>${skillScore<50 ? "Needs improvement: work on weaknesses." : "Good foundation!"}</p>
            <h3>🤖 AI ANALYSIS RESULT</h3>
            <p><strong>Recommended Career:</strong> ${analysis.careerPath}</p>
            <p><strong>Suggested Companies:</strong> ${analysis.companies}</p>
            <h3>📊 SWOT ANALYSIS</h3>
            <div class="swot-grid">
                <div class="swot-card strength-card"><h4>💪 STRENGTHS</h4><p>${analysis.S}</p></div>
                <div class="swot-card weakness-card"><h4>🔻 WEAKNESSES</h4><p>${analysis.W}</p></div>
                <div class="swot-card opportunity-card"><h4>🌟 OPPORTUNITIES</h4><p>${analysis.O}</p></div>
                <div class="swot-card threat-card"><h4>⚠️ THREATS</h4><p>${analysis.T}</p></div>
            </div>
            <h3>🧘 PERSONAL DEVELOPMENT</h3><p>${analysis.personalDev}</p>
            <h3>📌 WHAT TO FOLLOW</h3><p>${analysis.whatToFollow}</p>
            <h3>📚 FREE COURSES</h3><ul><li>SWAYAM, NPTEL</li><li>freeCodeCamp</li><li>YouTube tutorials</li></ul>
            <h3>💰 FINANCIAL ADVICE</h3><p>${parseInt(budget)<300000 ? "Use free resources & scholarships." : "You can invest in paid certifications."}</p>
            <hr>
            <p>✅ Report has been sent to <strong>${parentEmail}</strong> (if Apps Script configured).</p>
        `;
        loadingDiv.style.display = 'none';
        btn.disabled = false;
        resultDiv.scrollIntoView({ behavior: 'smooth' });
    }
</script>
</body>
</html>
