<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Neural Path 2.0 - All Inputs UPPERCASE</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: #f1f5f9;
            padding: 20px;
            min-height: 100vh;
        }
        .container {
            max-width: 650px;
            margin: 0 auto;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            padding: 20px;
            box-shadow: 0 25px 45px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.2);
        }
        h1 { font-size: 28px; text-align: center; background: linear-gradient(135deg, #a855f7, #3b82f6); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .sub { text-align: center; font-size: 14px; opacity: 0.8; margin-bottom: 20px; }
        .form-group { margin-bottom: 20px; border-bottom: 1px solid #334155; padding-bottom: 15px; }
        label.main-label { display: block; font-weight: 700; margin-bottom: 8px; font-size: 14px; letter-spacing: 0.5px; color: #cbd5e1; }
        .custom-select-btn {
            width: 100%;
            padding: 12px;
            background: #334155;
            border-radius: 24px;
            border: none;
            color: white;
            text-align: left;
            font-size: 14px;
            cursor: pointer;
        }
        input, input[type="text"], input[type="number"], input[type="email"], select {
            width: 100%;
            padding: 12px;
            border-radius: 24px;
            border: none;
            background: #334155;
            color: white;
            font-size: 14px;
            outline: none;
        }
        /* Uppercase for text inputs */
        input[type="text"], input[type="text"]:focus, input[type="text"]:active {
            text-transform: uppercase;
        }
        .stars { display: flex; gap: 10px; font-size: 32px; cursor: pointer; justify-content: center; margin: 10px 0; }
        .star { color: #475569; transition: 0.1s; }
        .star.selected { color: #fbbf24; text-shadow: 0 0 4px gold; }
        button { width: 100%; padding: 14px; background: linear-gradient(135deg, #a855f7, #3b82f6); border: none; border-radius: 40px; font-size: 18px; font-weight: bold; color: white; cursor: pointer; margin-top: 10px; }
        button:active { transform: scale(0.98); }
        .result { margin-top: 30px; background: #0f172a; border-radius: 24px; padding: 20px; display: none; }
        .result h3 { color: #c084fc; margin-top: 20px; border-left: 4px solid #c084fc; padding-left: 12px; }
        .swot-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 10px;
        }
        .swot-card {
            background: #1e293b;
            border-radius: 20px;
            padding: 12px;
            border-top: 4px solid;
        }
        .swot-card h4 { margin-bottom: 8px; font-size: 16px; }
        .swot-card p { font-size: 13px; line-height: 1.4; }
        .strength-card { border-color: #22c55e; }
        .weakness-card { border-color: #ef4444; }
        .opportunity-card { border-color: #3b82f6; }
        .threat-card { border-color: #f97316; }
        .loading { display: none; text-align: center; margin-top: 15px; }
        hr { border-color: #334155; margin: 15px 0; }
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.7);
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background: #1e293b;
            margin: 20px;
            padding: 20px;
            border-radius: 32px;
            max-width: 500px;
            width: 90%;
            max-height: 80%;
            overflow-y: auto;
            border: 1px solid #a855f7;
        }
        .modal-question {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 15px;
            color: #c084fc;
        }
        .modal-question small {
            font-size: 12px;
            color: #94a3b8;
            display: block;
            margin-top: 5px;
        }
        .checkbox-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 20px;
        }
        .checkbox-group label {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 16px;
        }
        .modal-buttons {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }
        .modal-buttons button {
            width: auto;
            padding: 8px 16px;
            margin-top: 0;
        }
        .alignment-scale {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            margin-top: 5px;
            font-size: 11px;
            color: #94a3b8;
        }
        .reload-btn {
            background: #334155;
            margin-top: 20px;
        }
        /* Force uppercase for dropdown text options (they are already uppercase) */
        select option {
            text-transform: none;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>🧠 NEURAL PATH 2.0</h1>
    <div class="sub">ALL ANSWERS ARE STORED IN CAPS</div>

    <form id="parentForm">
        <!-- PARENT DETAILS -->
        <div class="form-group"><label class="main-label">👨‍👩 PARENT/GUARDIAN NAME</label><input type="text" id="parentName" required placeholder="e.g., RAJESH SHARMA" oninput="this.value = this.value.toUpperCase()"></div>
        <div class="form-group"><label class="main-label">RELATIONSHIP TO CHILD</label>
            <select id="relationship" required>
                <option value="">SELECT</option>
                <option value="FATHER">FATHER</option>
                <option value="MOTHER">MOTHER</option>
                <option value="GUARDIAN">GUARDIAN</option>
            </select>
        </div>

        <!-- CHILD NAME -->
        <div class="form-group"><label class="main-label">👶 CHILD'S FULL NAME</label><input type="text" id="childName" required placeholder="e.g., ARYAN SHARMA" oninput="this.value = this.value.toUpperCase()"></div>
        
        <!-- AGE -->
        <div class="form-group"><label class="main-label">1. CHILD'S AGE (YEARS)</label>
            <select id="age" required><option value="">SELECT AGE</option>
            <option>5</option><option>6</option><option>7</option><option>8</option><option>9</option><option>10</option>
            <option>11</option><option>12</option><option>13</option><option>14</option><option>15</option><option>16</option>
            <option>17</option><option>18</option><option>19</option><option>20</option><option>21</option><option>22</option>
            <option>23</option><option>24</option><option>25</option></select>
        </div>

        <!-- HEIGHT & WEIGHT -->
        <div class="form-group"><label class="main-label">2. HEIGHT (cm) & WEIGHT (kg)</label>
            <div style="display: flex; gap: 10px;">
                <input type="number" id="height" placeholder="Height (cm)" style="width:50%">
                <input type="number" id="weight" placeholder="Weight (kg)" style="width:50%">
            </div>
        </div>

        <!-- INTERESTS (multiple) -->
        <div class="form-group"><label class="main-label">3. FAVORITE ACTIVITIES / SUBJECTS</label>
            <button type="button" class="custom-select-btn" id="interestsBtn">Select options...</button>
            <input type="hidden" id="interests" value="">
        </div>

        <!-- EXTRA CURRICULAR -->
        <div class="form-group"><label class="main-label">4. EXTRA CURRICULAR ACTIVITIES</label>
            <button type="button" class="custom-select-btn" id="extracurricularBtn">Select options...</button>
            <input type="hidden" id="extracurricular" value="">
        </div>

        <!-- TV SHOW -->
        <div class="form-group"><label class="main-label">5. FAVORITE TV SHOW / WEB SERIES</label>
            <input type="text" id="tvshow" placeholder="e.g., SHARK TANK" oninput="this.value = this.value.toUpperCase()">
        </div>

        <!-- TARGET COMPANY -->
        <div class="form-group"><label class="main-label">6. FUTURE TARGET COMPANY / ORGANIZATION</label>
            <input type="text" id="targetOrg" placeholder="e.g., GOOGLE, ISRO" oninput="this.value = this.value.toUpperCase()">
        </div>

        <!-- STRENGTHS -->
        <div class="form-group"><label class="main-label">7. STRENGTHS</label>
            <button type="button" class="custom-select-btn" id="strengthsBtn">Select options...</button>
            <input type="hidden" id="strengths" value="">
        </div>

        <!-- WEAKNESSES -->
        <div class="form-group"><label class="main-label">8. WEAKNESSES</label>
            <button type="button" class="custom-select-btn" id="weaknessesBtn">Select options...</button>
            <input type="hidden" id="weaknesses" value="">
        </div>

        <!-- MENTAL CONDITION -->
        <div class="form-group"><label class="main-label">9. MENTAL CONDITION</label>
            <button type="button" class="custom-select-btn" id="mentalBtn">Select options...</button>
            <input type="hidden" id="mental" value="">
        </div>

        <!-- PHYSICAL HEALTH -->
        <div class="form-group"><label class="main-label">10. PHYSICAL HEALTH</label>
            <button type="button" class="custom-select-btn" id="physicalBtn">Select options...</button>
            <input type="hidden" id="physical" value="">
        </div>

        <!-- BUDGET -->
        <div class="form-group"><label class="main-label">11. ANNUAL BUDGET (₹ PER YEAR)</label>
            <select id="budget" required>
                <option value="">SELECT</option><option value="100000">LESS THAN ₹1 LAKH</option>
                <option value="300000">₹1 LAKH - ₹3 LAKH</option><option value="500000">₹3 LAKH - ₹5 LAKH</option>
                <option value="800000">₹5 LAKH - ₹8 LAKH</option><option value="1200000">₹8 LAKH - ₹12 LAKH</option>
                <option value="2000000">ABOVE ₹12 LAKH</option>
            </select>
        </div>

        <!-- CITY -->
        <div class="form-group"><label class="main-label">12. CITY / STATE</label><input type="text" id="city" required placeholder="e.g., DELHI" oninput="this.value = this.value.toUpperCase()"></div>

        <!-- LONG TERM GOAL -->
        <div class="form-group"><label class="main-label">13. LONG TERM GOAL</label>
            <button type="button" class="custom-select-btn" id="goalBtn">Select options...</button>
            <input type="hidden" id="goal" value="">
        </div>

        <!-- Q14 AGREEMENT LEVEL -->
        <div class="form-group"><label class="main-label">14. PARENT-CHILD AGREEMENT LEVEL (1-10)</label>
            <select id="alignment" required>
                <option value="">SELECT</option>
                <option value="1">1 – COMPLETE DISAGREEMENT (OPPOSITE GOALS)</option>
                <option value="2">2 – MOSTLY DISAGREE</option>
                <option value="3">3 – SLIGHT DISAGREEMENT</option>
                <option value="4">4 – SLIGHTLY AGREE BUT CONFUSED</option>
                <option value="5">5 – NEUTRAL / NO CLEAR AGREEMENT</option>
                <option value="6">6 – SOMEWHAT AGREE</option>
                <option value="7">7 – MOSTLY AGREE</option>
                <option value="8">8 – STRONGLY AGREE</option>
                <option value="9">9 – ALMOST PERFECT MATCH</option>
                <option value="10">10 – PERFECT AGREEMENT (SAME VISION)</option>
            </select>
            <div class="alignment-scale">💡 1 = COMPLETELY DIFFERENT GOALS | 10 = PARENTS AND CHILD WANT EXACTLY THE SAME FUTURE</div>
        </div>

        <!-- EMAIL (converted to lowercase) -->
        <div class="form-group"><label class="main-label">📧 PARENT'S EMAIL (TO RECEIVE REPORT)</label>
            <input type="email" id="parentEmail" placeholder="parent@example.com" required>
        </div>

        <!-- RATING -->
        <div class="form-group"><label class="main-label">⭐ RATE THIS APP</label>
            <div class="stars" id="starRating">
                <span class="star" data-value="1">☆</span><span class="star" data-value="2">☆</span>
                <span class="star" data-value="3">☆</span><span class="star" data-value="4">☆</span><span class="star" data-value="5">☆</span>
            </div>
            <input type="hidden" id="ratingValue" value="0">
        </div>

        <button type="button" onclick="submitAndGenerate()">✨ GENERATE & SEND REPORT ✨</button>
    </form>
    <div class="loading" id="loading">⏳ SENDING REPORT...</div>
    <div id="result" class="result"></div>
</div>

<!-- MODAL POPUP -->
<div id="modal" class="modal">
    <div class="modal-content">
        <div id="modalQuestion" class="modal-question"></div>
        <div id="modalCheckboxes" class="checkbox-group"></div>
        <div class="modal-buttons">
            <button id="modalCancel">CANCEL</button>
            <button id="modalSave">SAVE</button>
        </div>
    </div>
</div>

<script>
    // All multiple-select fields with uppercase options
    const fieldsConfig = {
        interests: {
            label: "3. FAVORITE ACTIVITIES / SUBJECTS",
            options: ["GAMING & COMPUTERS", "CODING & PROGRAMMING", "DRAWING & DESIGN", "SPORTS & PHYSICAL", "READING & WRITING", "MATHS & LOGIC", "SCIENCE & EXPERIMENTS", "MUSIC & ARTS", "BUSINESS & MONEY"]
        },
        extracurricular: {
            label: "4. EXTRA CURRICULAR ACTIVITIES",
            options: ["SPORTS (CRICKET/FOOTBALL)", "CHESS / BOARD GAMES", "MUSIC / DANCE", "CODING CLUB / ROBOTICS", "DEBATE / DRAMA", "ART & CRAFT", "VOLUNTEERING / SOCIAL WORK"]
        },
        strengths: {
            label: "7. STRENGTHS",
            options: ["PROBLEM SOLVING", "CREATIVE THINKING", "LEADERSHIP", "HARD WORKING", "QUICK LEARNER", "GOOD MEMORY", "TEAM PLAYER"]
        },
        weaknesses: {
            label: "8. WEAKNESSES",
            options: ["PUBLIC SPEAKING FEAR", "LACK OF DISCIPLINE", "WEAK IN MATHS", "POOR WRITING SKILLS", "LOW CONFIDENCE", "DELAYS TASKS / POSTPONES"]
        },
        mental: {
            label: "9. MENTAL CONDITION",
            options: ["ANXIOUS / WORRIED", "LOW CONFIDENCE", "STRESSED OFTEN", "HAPPY & CALM", "SHORT TEMPER"]
        },
        physical: {
            label: "10. PHYSICAL HEALTH",
            options: ["EYE SIGHT ISSUE", "OBESITY / WEIGHT", "LOW STAMINA", "FIT & ACTIVE", "FREQUENT SICKNESS"]
        },
        goal: {
            label: "13. LONG TERM GOAL",
            options: ["SETTLE ABROAD", "START MY OWN BUSINESS", "STABLE GOVERNMENT JOB", "HIGH PAYING PRIVATE JOB", "BECOME A RESEARCHER/SCIENTIST"]
        }
    };

    let currentModalField = null;

    function openModal(fieldId) {
        currentModalField = fieldId;
        const config = fieldsConfig[fieldId];
        const modal = document.getElementById('modal');
        const questionDiv = document.getElementById('modalQuestion');
        const checkboxesDiv = document.getElementById('modalCheckboxes');
        
        questionDiv.innerHTML = `${config.label} <small>(SELECT ONE OR MORE)</small>`;
        
        let hiddenValue = document.getElementById(fieldId).value;
        let selectedArr = hiddenValue ? hiddenValue.split(", ") : [];
        
        checkboxesDiv.innerHTML = "";
        config.options.forEach(opt => {
            let isChecked = selectedArr.includes(opt);
            let cb = document.createElement('label');
            cb.innerHTML = `<input type="checkbox" value="${opt}" ${isChecked ? 'checked' : ''}> ${opt}`;
            checkboxesDiv.appendChild(cb);
        });
        modal.style.display = 'flex';
    }

    function saveModal() {
        if (!currentModalField) return;
        const checkboxes = document.querySelectorAll('#modalCheckboxes input[type="checkbox"]');
        let selected = [];
        checkboxes.forEach(cb => { if (cb.checked) selected.push(cb.value); });
        let selectedStr = selected.join(", ");
        document.getElementById(currentModalField).value = selectedStr;
        let btn = document.getElementById(currentModalField + "Btn");
        if (selectedStr) btn.innerText = selectedStr; else btn.innerText = "SELECT OPTIONS...";
        closeModal();
    }

    function closeModal() { document.getElementById('modal').style.display = 'none'; currentModalField = null; }

    for (let fieldId in fieldsConfig) {
        let btn = document.getElementById(fieldId + "Btn");
        if (btn) btn.addEventListener('click', () => openModal(fieldId));
    }
    document.getElementById('modalSave').addEventListener('click', saveModal);
    document.getElementById('modalCancel').addEventListener('click', closeModal);
    window.onclick = function(event) { let modal = document.getElementById('modal'); if (event.target === modal) closeModal(); };

    // Star rating
    let stars = document.querySelectorAll('.star');
    let ratingInput = document.getElementById('ratingValue');
    stars.forEach(star => {
        star.addEventListener('click', function() {
            let value = parseInt(this.getAttribute('data-value'));
            ratingInput.value = value;
            stars.forEach((s, idx) => { if(idx < value) { s.innerHTML = '★'; s.classList.add('selected'); } else { s.innerHTML = '☆'; s.classList.remove('selected'); } });
        });
    });

    function getHiddenValue(id) { let val = document.getElementById(id).value; return val ? val.toUpperCase() : ""; } // ensure uppercase

    // AI analysis (same as before but all strings uppercase internally)
    function generateAnalysis(childName, age, height, weight, interests, extracurricular, tvshow, targetOrg, strengths, weaknesses, mental, physical, budget, goal, alignment) {
        let careerPath = "";
        if (interests.includes("CODING") || interests.includes("GAMING") || extracurricular.includes("CODING")) careerPath = "AI/ML SOFTWARE ENGINEER";
        else if (interests.includes("DRAWING") || interests.includes("DESIGN")) careerPath = "UI/UX DESIGNER";
        else if (interests.includes("SPORTS") || extracurricular.includes("SPORTS")) { if (height && height > 170) careerPath = "PROFESSIONAL ATHLETE"; else careerPath = "SPORTS MANAGEMENT"; }
        else if (interests.includes("BUSINESS") || tvshow.includes("SHARK TANK")) careerPath = "ENTREPRENEUR";
        else careerPath = "DIGITAL MARKETING";
        if (targetOrg.includes("GOOGLE")) careerPath = "SOFTWARE ENGINEER AT GOOGLE";
        else if (targetOrg.includes("ISRO")) careerPath = "AEROSPACE SCIENTIST";
        let S = strengths ? "✅ " + strengths : "✅ BASIC STRENGTHS";
        let W = weaknesses ? "⚠️ " + weaknesses : "⚠️ NO MAJOR WEAKNESS";
        let O = (parseInt(budget)>=500000) ? "💰 GOOD BUDGET" : "💰 LIMITED BUDGET, USE FREE RESOURCES";
        let T = mental.includes("ANXIOUS") ? "😟 STRESS MANAGEMENT NEEDED" : "NO MAJOR THREATS";
        let companies = (careerPath.includes("SOFTWARE")) ? "GOOGLE, MICROSOFT, AMAZON" : "TATA, INFOSYS";
        return { careerPath, S, W, O, T, companies };
    }

    // Replace with your actual Google Apps Script URL
    const SCRIPT_URL = "https://docs.google.com/spreadsheets/d/13I3XJNo_JLPYUO8qW2PS4E-48T-Uqr7saAgSyDbzwDw/edit?gid=0#gid=0";

    async function submitAndGenerate() {
        // Get all values and convert text fields to uppercase (except email)
        let parentName = document.getElementById('parentName').value.trim().toUpperCase();
        let relationship = document.getElementById('relationship').value;
        let childName = document.getElementById('childName').value.trim().toUpperCase();
        let age = document.getElementById('age').value;
        let height = document.getElementById('height').value || "";
        let weight = document.getElementById('weight').value || "";
        let interests = getHiddenValue('interests');
        let extracurricular = getHiddenValue('extracurricular');
        let tvshow = document.getElementById('tvshow').value.trim().toUpperCase();
        let targetOrg = document.getElementById('targetOrg').value.trim().toUpperCase();
        let strengths = getHiddenValue('strengths');
        let weaknesses = getHiddenValue('weaknesses');
        let mental = getHiddenValue('mental');
        let physical = getHiddenValue('physical');
        let budget = document.getElementById('budget').value;
        let city = document.getElementById('city').value.trim().toUpperCase();
        let goal = getHiddenValue('goal');
        let alignment = document.getElementById('alignment').value;
        let parentEmail = document.getElementById('parentEmail').value.trim().toLowerCase();
        let rating = document.getElementById('ratingValue').value;

        if(!parentName || !relationship || !childName || !age || !budget || !city || !alignment || !parentEmail) {
            alert("PLEASE FILL ALL MANDATORY FIELDS (PARENT NAME, RELATIONSHIP, CHILD NAME, AGE, BUDGET, CITY, AGREEMENT LEVEL, EMAIL)");
            return;
        }
        if(rating == "0") { alert("PLEASE RATE THE APP"); return; }
        if(!interests || !strengths || !weaknesses || !mental || !physical || !goal) {
            alert("PLEASE SELECT OPTIONS FOR ALL MULTIPLE-CHOICE FIELDS (USE THE BUTTONS)");
            return;
        }

        let analysis = generateAnalysis(childName, age, height, weight, interests, extracurricular, tvshow, targetOrg, strengths, weaknesses, mental, physical, budget, goal, alignment);
        let skillScore = 50;
        if(strengths.includes("PROBLEM SOLVING")) skillScore += 15;
        if(weaknesses.includes("PUBLIC SPEAKING")) skillScore -= 10;
        skillScore = Math.min(100, Math.max(20, skillScore));

        let payload = {
            timestamp: new Date().toISOString(),
            parentName, relationship, childName, age, height, weight, interests, extracurricular, tvshow, targetOrg,
            strengths, weaknesses, mental, physical, budget, city, goal, alignment,
            parentEmail, rating, skillScore, careerPath: analysis.careerPath,
            swot_s: analysis.S, swot_w: analysis.W, swot_o: analysis.O, swot_t: analysis.T
        };

        let loadingDiv = document.getElementById('loading');
        let btn = document.querySelector('button');
        loadingDiv.style.display = 'block';
        btn.disabled = true;

        if(SCRIPT_URL && SCRIPT_URL !== "YOUR_GOOGLE_SCRIPT_URL") {
            try {
                await fetch(SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
            } catch(e) { console.error(e); }
        } else {
            alert("GOOGLE SHEET URL NOT CONFIGURED. DATA NOT SAVED.");
        }

        let resultDiv = document.getElementById('result');
        resultDiv.style.display = 'block';
        resultDiv.innerHTML = `
            <h3>🎯 SKILL SCORE: ${skillScore}/100</h3>
            <h3>🤖 RECOMMENDED CAREER: ${analysis.careerPath}</h3>
            <h3>📊 SWOT ANALYSIS</h3>
            <div class="swot-grid">
                <div class="swot-card strength-card"><h4>💪 STRENGTHS</h4><p>${analysis.S}</p></div>
                <div class="swot-card weakness-card"><h4>🔻 WEAKNESSES</h4><p>${analysis.W}</p></div>
                <div class="swot-card opportunity-card"><h4>🌟 OPPORTUNITIES</h4><p>${analysis.O}</p></div>
                <div class="swot-card threat-card"><h4>⚠️ THREATS</h4><p>${analysis.T}</p></div>
            </div>
            <p>✅ REPORT SENT TO ${parentEmail}</p>
            <button class="reload-btn" onclick="location.reload();">🔄 FILL ANOTHER FORM</button>
        `;
        loadingDiv.style.display = 'none';
        btn.disabled = false;
        resultDiv.scrollIntoView({ behavior: 'smooth' });
    }
</script>
</body>
</html>
