<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Neural Path 2.0 - Skill Score Explanation</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: #f1f5f9;
            padding: 20px;
            min-height: 100vh;
        }
        .container {
            max-width: 650px;
            margin: 0 auto;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            padding: 20px;
            box-shadow: 0 25px 45px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.2);
        }
        h1 { font-size: 28px; text-align: center; background: linear-gradient(135deg, #a855f7, #3b82f6); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .sub { text-align: center; font-size: 14px; opacity: 0.8; margin-bottom: 20px; }
        .form-group { margin-bottom: 20px; border-bottom: 1px solid #334155; padding-bottom: 15px; }
        label.main-label { display: block; font-weight: 700; margin-bottom: 8px; font-size: 14px; letter-spacing: 0.5px; color: #cbd5e1; }
        .custom-select-btn {
            width: 100%;
            padding: 12px;
            background: #334155;
            border-radius: 24px;
            border: none;
            color: white;
            text-align: left;
            font-size: 14px;
            cursor: pointer;
        }
        input, input[type="text"], input[type="number"], input[type="email"], input[type="date"], select {
            width: 100%;
            padding: 12px;
            border-radius: 24px;
            border: none;
            background: #334155;
            color: white;
            font-size: 14px;
            outline: none;
        }
        .stars { display: flex; gap: 10px; font-size: 32px; cursor: pointer; justify-content: center; margin: 10px 0; }
        .star { color: #475569; transition: 0.1s; }
        .star.selected { color: #fbbf24; text-shadow: 0 0 4px gold; }
        button { width: 100%; padding: 14px; background: linear-gradient(135deg, #a855f7, #3b82f6); border: none; border-radius: 40px; font-size: 18px; font-weight: bold; color: white; cursor: pointer; margin-top: 10px; }
        button:active { transform: scale(0.98); }
        .result { margin-top: 30px; background: #0f172a; border-radius: 24px; padding: 20px; display: none; }
        .result h3 { color: #c084fc; margin-top: 20px; border-left: 4px solid #c084fc; padding-left: 12px; }
        .swot-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 10px;
        }
        .swot-card {
            background: #1e293b;
            border-radius: 20px;
            padding: 12px;
            border-top: 4px solid;
        }
        .swot-card h4 { margin-bottom: 8px; font-size: 16px; }
        .swot-card p { font-size: 13px; line-height: 1.4; }
        .strength-card { border-color: #22c55e; }
        .weakness-card { border-color: #ef4444; }
        .opportunity-card { border-color: #3b82f6; }
        .threat-card { border-color: #f97316; }
        .loading { display: none; text-align: center; margin-top: 15px; }
        hr { border-color: #334155; margin: 15px 0; }
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.85);
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background: #1e293b;
            margin: 20px;
            padding: 20px;
            border-radius: 32px;
            max-width: 600px;
            width: 90%;
            max-height: 85%;
            overflow-y: auto;
            border: 1px solid #a855f7;
        }
        .modal-question {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 15px;
            color: #c084fc;
        }
        .modal-question small { font-size: 12px; color: #94a3b8; display: block; margin-top: 5px; }
        .checkbox-group { display: flex; flex-direction: column; gap: 12px; margin-bottom: 20px; }
        .checkbox-group label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 15px;
            line-height: 1.4;
            white-space: normal;
            word-break: normal;
            overflow-wrap: break-word;
            width: 100%;
        }
        .checkbox-group input { flex-shrink: 0; width: 18px; height: 18px; }
        .modal-buttons { display: flex; gap: 10px; justify-content: flex-end; margin-top: 10px; }
        .modal-buttons button { width: auto; padding: 8px 16px; margin-top: 0; }
        .alignment-scale { display: flex; flex-wrap: wrap; justify-content: space-between; margin-top: 5px; font-size: 11px; color: #94a3b8; }
        .reload-btn { background: #334155; margin-top: 20px; }
        .disclaimer {
            background: rgba(0,0,0,0.4);
            border-left: 4px solid #f97316;
            padding: 12px;
            border-radius: 16px;
            margin: 20px 0 10px 0;
            font-size: 12px;
            color: #facc15;
            text-align: center;
        }
        .astrology-card {
            background: #1e293b;
            border-radius: 20px;
            padding: 12px;
            margin: 15px 0;
            border-left: 4px solid #fbbf24;
            font-size: 13px;
        }
        .college-table { overflow-x: auto; }
        .college-table table { width: 100%; border-collapse: collapse; background: #1e293b; border-radius: 16px; }
        .college-table th, .college-table td { padding: 10px; text-align: left; border-bottom: 1px solid #334155; }
        .college-table th { background: #0f172a; color: #c084fc; }
        .pdf-btn { background: #334155; margin-top: 20px; }
        .financial-advice { background: #0f172a; padding: 12px; border-radius: 16px; margin: 10px 0; border-left: 4px solid #22c55e; }
        .report-header {
            background: #0f172a;
            border-radius: 20px;
            padding: 15px;
            margin-bottom: 20px;
            border: 1px solid #334155;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
        }
        .report-header .left { text-align: left; }
        .report-header .right { text-align: right; }
        .report-header p { margin: 4px 0; font-size: 14px; }
        .report-header strong { color: #c084fc; }
        .time-estimate {
            background: #0f172a;
            padding: 12px;
            border-radius: 16px;
            margin: 15px 0;
            border-left: 4px solid #fbbf24;
        }
        .skill-note {
            background: #1e293b;
            padding: 8px 12px;
            border-radius: 12px;
            font-size: 12px;
            color: #94a3b8;
            margin: 5px 0 10px 0;
        }
        @media print {
            body { background: white; color: black; }
            .container { background: white; box-shadow: none; padding: 0; }
            .form-group, .stars, button:not(.pdf-btn), .loading, .modal, .sub { display: none; }
            .result { display: block !important; background: white; color: black; }
            .result h3 { color: #2c3e66; }
            .swot-card, .astrology-card, .college-table table, .report-header, .time-estimate, .skill-note { background: #f0f0f0; color: black; border-color: #ccc; }
            .pdf-btn { display: block; }
        }
    </style>
</head>
<body>
<div class="container">
    <h1>🧠 Neural Path 2.0</h1>
    <div class="sub">Complete Career Roadmap + Financial Advice</div>

    <form id="parentForm">
        <div class="form-group"><label class="main-label">👨‍👩 Parent/Guardian Name</label><input type="text" id="parentName" required placeholder="e.g., Rajesh Sharma"></div>
        <div class="form-group"><label class="main-label">Relationship to Child</label>
            <select id="relationship" required><option value="">Select</option><option value="Father">Father</option><option value="Mother">Mother</option><option value="Guardian">Guardian</option></select>
        </div>
        <div class="form-group"><label class="main-label">👶 Child's Full Name</label><input type="text" id="childName" required placeholder="e.g., Aryan Sharma"></div>
        <div class="form-group"><label class="main-label">Child's Gender</label>
            <select id="childGender" required><option value="">Select</option><option value="Male">Male</option><option value="Female">Female</option><option value="Other">Other</option></select>
        </div>
        <div class="form-group"><label class="main-label">1. Child's Date of Birth (DOB)</label><input type="date" id="dob" required></div>
        <div class="form-group"><label class="main-label">2. Height (cm) & Weight (kg)</label>
            <div style="display: flex; gap: 10px;"><input type="number" id="height" placeholder="Height (cm)" style="width:50%"><input type="number" id="weight" placeholder="Weight (kg)" style="width:50%"></div>
        </div>
        <div class="form-group"><label class="main-label">3. Favorite Activities / Subjects</label><button type="button" class="custom-select-btn" id="interestsBtn">Select options...</button><input type="hidden" id="interests" value=""></div>
        <div class="form-group"><label class="main-label">4. Extra Curricular Activities</label><button type="button" class="custom-select-btn" id="extracurricularBtn">Select options...</button><input type="hidden" id="extracurricular" value=""></div>
        <div class="form-group"><label class="main-label">5. Favorite TV Show / Web Series Genre</label>
            <select id="tvshow" required>
                <option value="">Select genre</option>
                <option value="Animated">Animated</option>
                <option value="Thriller">Thriller</option>
                <option value="Fiction">Fiction</option>
                <option value="Documentary">Documentary</option>
                <option value="Sci-Fi">Sci-Fi</option>
                <option value="Comedy">Comedy</option>
                <option value="Drama">Drama</option>
                <option value="Reality Show">Reality Show</option>
                <option value="Action">Action</option>
                <option value="Romance">Romance</option>
            </select>
        </div>
        <div class="form-group"><label class="main-label">6. Strengths</label><button type="button" class="custom-select-btn" id="strengthsBtn">Select options...</button><input type="hidden" id="strengths" value=""></div>
        <div class="form-group"><label class="main-label">7. Weaknesses</label><button type="button" class="custom-select-btn" id="weaknessesBtn">Select options...</button><input type="hidden" id="weaknesses" value=""></div>
        <div class="form-group"><label class="main-label">8. Mental Condition</label><button type="button" class="custom-select-btn" id="mentalBtn">Select options...</button><input type="hidden" id="mental" value=""></div>
        <div class="form-group"><label class="main-label">9. Physical Health</label><button type="button" class="custom-select-btn" id="physicalBtn">Select options...</button><input type="hidden" id="physical" value=""></div>
        <div class="form-group"><label class="main-label">10. Annual Budget (₹ per year) - Includes tuition, coaching, living, etc.</label>
            <select id="budget" required>
                <option value="">Select</option>
                <option value="100000">Less than ₹1 lakh</option>
                <option value="300000">₹1 lakh - ₹3 lakh</option>
                <option value="500000">₹3 lakh - ₹5 lakh</option>
                <option value="800000">₹5 lakh - ₹8 lakh</option>
                <option value="1200000">₹8 lakh - ₹12 lakh</option>
                <option value="2000000">₹12 lakh - ₹20 lakh</option>
                <option value="4000000">₹20 lakh - ₹40 lakh</option>
                <option value="10000000">₹40 lakh - ₹1 crore</option>
                <option value="15000000">Above ₹1 crore</option>
            </select>
        </div>
        <div class="form-group"><label class="main-label">11. City / State</label><input type="text" id="city" required placeholder="e.g., Delhi"></div>
        <div class="form-group"><label class="main-label">12. Long Term Goal</label><button type="button" class="custom-select-btn" id="goalBtn">Select options...</button><input type="hidden" id="goal" value=""></div>
        <div class="form-group"><label class="main-label">13. Parents' Desired Field for Child</label>
            <select id="parentDesiredField" required>
                <option value="">Select</option>
                <option value="Science">Science (Engineering, Research)</option>
                <option value="Arts">Arts / Humanities</option>
                <option value="Commerce">Commerce / Business</option>
                <option value="Army">Army / Defence</option>
                <option value="Medical">Medical / Healthcare</option>
                <option value="Self Business">Self Business / Entrepreneurship</option>
                <option value="Not Sure">Not sure / Open to any</option>
            </select>
        </div>
        <div class="form-group"><label class="main-label">14. Parent-Child Agreement Level (1-10)</label>
            <select id="alignment" required><option value="">Select</option><option value="1">1 – Complete disagreement</option><option value="2">2 – Mostly disagree</option><option value="3">3 – Slight disagreement</option><option value="4">4 – Slightly agree but confused</option><option value="5">5 – Neutral</option><option value="6">6 – Somewhat agree</option><option value="7">7 – Mostly agree</option><option value="8">8 – Strongly agree</option><option value="9">9 – Almost perfect match</option><option value="10">10 – Perfect agreement</option></select>
            <div class="alignment-scale">💡 1 = different goals | 10 = same vision</div>
        </div>
        <div class="form-group"><label class="main-label">15. After school, how many hours does the child study daily?</label>
            <select id="studyHours" required>
                <option value="">Select</option>
                <option value="Less than 1 hour">Less than 1 hour</option>
                <option value="1-2 hours">1-2 hours</option>
                <option value="2-3 hours">2-3 hours</option>
                <option value="3-4 hours">3-4 hours</option>
                <option value="4-5 hours">4-5 hours</option>
                <option value="More than 5 hours">More than 5 hours</option>
            </select>
        </div>
        <div class="form-group"><label class="main-label">16. Current class and percentage / CGPA</label>
            <div style="display: flex; gap: 10px;">
                <input type="text" id="currentClass" placeholder="Class (e.g., 10th, 12th)" style="width:50%" required>
                <input type="text" id="percentage" placeholder="Percentage / CGPA (e.g., 85%, 8.5 CGPA)" style="width:50%" required>
            </div>
        </div>
        <div class="form-group"><label class="main-label">📧 Parent's Email (to receive report)</label><input type="email" id="parentEmail" placeholder="parent@example.com" required></div>
        <div class="form-group"><label class="main-label">⭐ Rate this app</label>
            <div class="stars" id="starRating"><span class="star" data-value="1">☆</span><span class="star" data-value="2">☆</span><span class="star" data-value="3">☆</span><span class="star" data-value="4">☆</span><span class="star" data-value="5">☆</span></div>
            <input type="hidden" id="ratingValue" value="0">
        </div>
        <div class="disclaimer">⚠️ <strong>Disclaimer:</strong> This is an AI-generated approximate analysis. Use as reference only.</div>
        <button type="button" onclick="submitAndGenerate()">✨ Generate Complete Report ✨</button>
    </form>
    <div class="loading" id="loading">⏳ Generating roadmap...</div>
    <div id="result" class="result"></div>
</div>

<div id="modal" class="modal"><div class="modal-content"><div id="modalQuestion" class="modal-question"></div><div id="modalCheckboxes" class="checkbox-group"></div><div class="modal-buttons"><button id="modalCancel">Cancel</button><button id="modalSave">Save</button></div></div></div>

<script>
    // All multiple-select fields
    const fieldsConfig = {
        interests: {
            label: "3. Favorite Activities / Subjects",
            options: ["Gaming & Computers", "Coding & Programming", "Drawing & Design", "Sports & Physical", "Reading & Writing", "Maths & Logic", "Science & Experiments", "Music & Arts", "Business & Management"]
        },
        extracurricular: {
            label: "4. Extra Curricular Activities",
            options: ["Sports (Cricket/Football)", "Chess / Board Games", "Music / Dance", "Coding Club / Robotics", "Debate / Drama", "Art & Craft", "Volunteering / Social Work"]
        },
        strengths: {
            label: "6. Strengths",
            options: ["Problem Solving", "Creative Thinking", "Leadership", "Hard Working", "Quick Learner", "Good Memory", "Team Player"]
        },
        weaknesses: {
            label: "7. Weaknesses",
            options: ["Public Speaking Fear", "Lack of Discipline", "Weak in Maths", "Poor Writing Skills", "Low Confidence", "Delays Tasks / Postpones"]
        },
        mental: {
            label: "8. Mental Condition",
            options: ["Anxious / Worried", "Low Confidence", "Stressed Often", "Happy & Calm", "Short Temper"]
        },
        physical: {
            label: "9. Physical Health",
            options: ["Eye Sight Issue", "Obesity / Weight", "Low Stamina", "Fit & Active", "Frequent Sickness"]
        },
        goal: {
            label: "12. Long Term Goal",
            options: ["Settle Abroad", "Start My Own Business", "Stable Government Job", "High Paying Private Job", "Become a Researcher/Scientist"]
        }
    };

    let currentModalField = null;
    function openModal(fieldId) {
        currentModalField = fieldId;
        const config = fieldsConfig[fieldId];
        const modal = document.getElementById('modal');
        const questionDiv = document.getElementById('modalQuestion');
        const checkboxesDiv = document.getElementById('modalCheckboxes');
        questionDiv.innerHTML = `${config.label} <small>(select one or more)</small>`;
        let hiddenValue = document.getElementById(fieldId).value;
        let selectedArr = hiddenValue ? hiddenValue.split(", ") : [];
        checkboxesDiv.innerHTML = "";
        config.options.forEach(opt => {
            let isChecked = selectedArr.includes(opt);
            let label = document.createElement('label');
            let cb = document.createElement('input');
            cb.type = 'checkbox';
            cb.value = opt;
            cb.checked = isChecked;
            label.appendChild(cb);
            label.appendChild(document.createTextNode(opt));
            checkboxesDiv.appendChild(label);
        });
        modal.style.display = 'flex';
    }
    function saveModal() {
        if (!currentModalField) return;
        const checkboxes = document.querySelectorAll('#modalCheckboxes input[type="checkbox"]');
        let selected = [];
        checkboxes.forEach(cb => { if (cb.checked) selected.push(cb.value); });
        let selectedStr = selected.join(", ");
        document.getElementById(currentModalField).value = selectedStr;
        let btn = document.getElementById(currentModalField + "Btn");
        if (selectedStr) btn.innerText = selectedStr; else btn.innerText = "Select options...";
        closeModal();
    }
    function closeModal() { document.getElementById('modal').style.display = 'none'; currentModalField = null; }
    for (let fieldId in fieldsConfig) { let btn = document.getElementById(fieldId + "Btn"); if (btn) btn.addEventListener('click', () => openModal(fieldId)); }
    document.getElementById('modalSave').addEventListener('click', saveModal);
    document.getElementById('modalCancel').addEventListener('click', closeModal);
    window.onclick = function(event) { let modal = document.getElementById('modal'); if (event.target === modal) closeModal(); };

    let stars = document.querySelectorAll('.star');
    let ratingInput = document.getElementById('ratingValue');
    stars.forEach(star => {
        star.addEventListener('click', function() {
            let value = parseInt(this.getAttribute('data-value'));
            ratingInput.value = value;
            stars.forEach((s, idx) => { if(idx < value) { s.innerHTML = '★'; s.classList.add('selected'); } else { s.innerHTML = '☆'; s.classList.remove('selected'); } });
        });
    });
    function getHiddenValue(id) { let val = document.getElementById(id).value; return val; }
    function calculateAge(dob) { let birthDate = new Date(dob); let today = new Date(); let age = today.getFullYear() - birthDate.getFullYear(); let m = today.getMonth() - birthDate.getMonth(); if (m < 0 || (m === 0 && today.getDate() < birthDate.getDate())) age--; return age; }
    function getZodiacSign(dob) { let date = new Date(dob); let month = date.getMonth() + 1, day = date.getDate(); if ((month == 1 && day >= 20) || (month == 2 && day <= 18)) return "Aquarius"; if ((month == 2 && day >= 19) || (month == 3 && day <= 20)) return "Pisces"; if ((month == 3 && day >= 21) || (month == 4 && day <= 19)) return "Aries"; if ((month == 4 && day >= 20) || (month == 5 && day <= 20)) return "Taurus"; if ((month == 5 && day >= 21) || (month == 6 && day <= 20)) return "Gemini"; if ((month == 6 && day >= 21) || (month == 7 && day <= 22)) return "Cancer"; if ((month == 7 && day >= 23) || (month == 8 && day <= 22)) return "Leo"; if ((month == 8 && day >= 23) || (month == 9 && day <= 22)) return "Virgo"; if ((month == 9 && day >= 23) || (month == 10 && day <= 22)) return "Libra"; if ((month == 10 && day >= 23) || (month == 11 && day <= 21)) return "Scorpio"; if ((month == 11 && day >= 22) || (month == 12 && day <= 21)) return "Sagittarius"; return "Capricorn"; }
    function getAstrologySuggestion(zodiac) { let s = { "Aries":"Entrepreneurship, sports, army", "Taurus":"Finance, banking, music", "Gemini":"Media, coding, teaching", "Cancer":"Psychology, healthcare", "Leo":"Acting, politics, management", "Virgo":"Data science, research", "Libra":"Law, design, diplomacy", "Scorpio":"Psychology, finance, surgery", "Sagittarius":"Travel, sports coaching", "Capricorn":"Engineering, corporate", "Aquarius":"AI, social work", "Pisces":"Arts, nursing" }; return s[zodiac] || "Hard work brings success."; }

    // College Recommendations
    function getCollegeRecommendations(careerPath, budget, city) {
        let path = careerPath.toUpperCase();
        let tableRows = "";
        if (path.includes("AI") || path.includes("SOFTWARE") || path.includes("COMPUTER")) {
            tableRows = `<tr><td style="padding: 8px;">IITs (Bombay, Delhi, Madras, Kanpur)</td><td style="padding: 8px;">April, May</td><td>JEE Advanced rank, 75% in class 12</td><td>~88-90 percentile in JEE Main</td></tr>
                          <tr><td style="padding: 8px;">NITs (Trichy, Surathkal, Warangal, Delhi)</td><td style="padding: 8px;">Jan, Feb, April</td><td>JEE Main score, 75% in class 12</td><td>CSE closing rank ~8,971 (NIT Delhi)</td></tr>
                          <tr><td style="padding: 8px;">IIIT Hyderabad</td><td style="padding: 8px;">May</td><td>UGEE exam, class 12 PCM</td><td>UGEE rank 62-255 (Gen)</td></tr>
                          <tr><td style="padding: 8px;">BITS Pilani</td><td style="padding: 8px;">May, June</td><td>BITSAT score, class 12 PCM</td><td>Pilani CSE ~304 marks</td></tr>`;
        } else if (path.includes("DESIGN")) {
            tableRows = `<tr><td style="padding: 8px;">NID Ahmedabad</td><td style="padding: 8px;">Jan, April</td><td>DAT Prelims + Mains</td><td>Merit based</td></tr>
                         <tr><td style="padding: 8px;">NIFT Delhi</td><td style="padding: 8px;">Nov, Feb</td><td>GAT + CAT, class 12</td><td>Closing rank ~62-74 (Gen)</td></tr>`;
        } else {
            tableRows = `<tr><td style="padding: 8px;">University of Delhi</td><td style="padding: 8px;">May, June</td><td>CUET score, class 12</td><td>Cutoffs 90-99%</td></tr>`;
        }
        return `<div class="college-table"><table style="width:100%; border-collapse: collapse;">${tableRows}</table></div><br><small>*Cutoffs approximate. Months tentative.</small>`;
    }

    // Field Recommendation
    function getFieldRecommendation(interests, strengths, weaknesses, tvshow) {
        let i = interests.toLowerCase();
        let s = strengths.toLowerCase();
        let w = weaknesses.toLowerCase();
        let tv = tvshow.toLowerCase();
        if (i.includes("coding") || i.includes("programming") || i.includes("computers") || i.includes("maths") || s.includes("problem solving")) return "Science (Engineering / Computer Science)";
        if (i.includes("drawing") || i.includes("design") || i.includes("music") || i.includes("arts")) return "Arts / Design / Fine Arts";
        if (i.includes("sports") || i.includes("physical")) return "Sports / Physical Education / Army (NDA)";
        if (i.includes("business") || i.includes("money") || tv.includes("shark tank")) return "Commerce / Business / Entrepreneurship";
        if (i.includes("science") || i.includes("experiments")) return "Science (Research / Medical)";
        if (s.includes("leadership") || s.includes("hard working")) return "Army / Defence Services (NDA, CDS)";
        if (w.includes("public speaking") || w.includes("low confidence")) return "Arts / Humanities / Psychology / Teaching";
        return "Multi-disciplinary – Explore both Science and Commerce based on further aptitude tests.";
    }

    // Scholarship suggestions
    function getScholarshipSuggestions(careerPath, budget, city) {
        let budgetNum = parseInt(budget);
        let suggestions = `<ul>`;
        if (budgetNum < 300000) suggestions += `<li>National Scholarship Portal (NSP)</li><li>LIC HFL Vidhyadhan Scholarship (income <₹6L)</li>`;
        else if (budgetNum < 2000000) suggestions += `<li>Merit-cum-Means Scholarship (IITs, NITs, BITS)</li><li>Google Anita Borg Scholarship</li>`;
        else if (budgetNum < 10000000) suggestions += `<li>Education loans (SBI, HDFC Credila)</li><li>College merit scholarships (BITS, VIT up to 100%)</li>`;
        else suggestions += `<li>Premium funding: education loans with subsidy</li><li>Private medical colleges merit scholarships</li><li>Inlaks, JN Tata Endowment for abroad</li>`;
        suggestions += `</ul>`;
        return suggestions;

    // Financial Advice
    function getFinancialAdvice(budget, careerPath) {
        let budgetNum = parseInt(budget);
        if (budgetNum < 300000) return "Budget limited: Focus on government colleges, free resources (NPTEL), NSP scholarships.";
        if (budgetNum < 2000000) return "Comfortable budget: Affordable private colleges (VIT, Manipal), consider merit scholarships.";
        if (budgetNum < 10000000) return "High budget: Top private engineering (BITS, IIITs) or study abroad with loan. Apply for merit waivers.";
        return "Premium budget: Can afford top medical (Kasturba, Manipal) or international universities. Use scholarships to save.";
    }

    // Estimated years
    function getEstimatedYears(currentClass, careerPath) {
        let classNum = parseInt(currentClass);
        if (isNaN(classNum)) {
            let match = currentClass.match(/\d+/);
            classNum = match ? parseInt(match[0]) : null;
        }
        let yearsToClass12 = 0;
        if (classNum && classNum < 12) yearsToClass12 = 12 - classNum;
        else if (classNum && classNum >= 12) yearsToClass12 = 0;
        else yearsToClass12 = 2;
        let yearsAfter12 = 0;
        let path = careerPath.toLowerCase();
        if (path.includes("software") || path.includes("engineer") || path.includes("ai") || path.includes("ml")) yearsAfter12 = 4;
        else if (path.includes("medical")) yearsAfter12 = 5.5;
        else if (path.includes("design")) yearsAfter12 = 4;
        else if (path.includes("sports")) yearsAfter12 = 3;
        else if (path.includes("entrepreneur")) yearsAfter12 = 3;
        else yearsAfter12 = 3;
        let totalYears = yearsToClass12 + yearsAfter12;
        let yearsToClass12Text = yearsToClass12 > 0 ? `${yearsToClass12} years to complete 12th, then ` : "";
        return `${yearsToClass12Text}approximately ${totalYears} years from now (including graduation).`;
    }

    function getSkillGapAnalysis(strengths, weaknesses, careerPath) {
        let gap = `<div><strong>Strengths:</strong> ${strengths || "Not specified"}<br><strong>Weaknesses:</strong> ${weaknesses || "Not specified"}<br><br><strong>Action plan:</strong><ul>`;
        if (weaknesses.includes("Public Speaking")) gap += `<li>Join Toastmasters or record daily 1-min selfie video.</li>`;
        if (weaknesses.includes("Delays Tasks") || weaknesses.includes("Postpones")) gap += `<li>Use Pomodoro technique (25 min work, 5 min break).</li>`;
        if (!weaknesses.includes("Public Speaking") && !weaknesses.includes("Delays Tasks")) gap += `<li>No major skill gaps – focus on advanced certifications.</li>`;
