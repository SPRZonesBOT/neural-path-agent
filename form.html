<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Neural Path 2.0 - Modal Gap Fixed</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: #f1f5f9;
            padding: 20px;
            min-height: 100vh;
        }
        .container {
            max-width: 650px;
            margin: 0 auto;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            padding: 20px;
            box-shadow: 0 25px 45px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.2);
        }
        h1 { font-size: 28px; text-align: center; background: linear-gradient(135deg, #a855f7, #3b82f6); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .sub { text-align: center; font-size: 14px; opacity: 0.8; margin-bottom: 20px; }
        .form-group { margin-bottom: 20px; border-bottom: 1px solid #334155; padding-bottom: 15px; }
        label.main-label { display: block; font-weight: 700; margin-bottom: 8px; font-size: 14px; letter-spacing: 0.5px; color: #cbd5e1; }
        .custom-select-btn {
            width: 100%;
            padding: 12px;
            background: #334155;
            border-radius: 24px;
            border: none;
            color: white;
            text-align: left;
            font-size: 14px;
            cursor: pointer;
        }
        input, input[type="text"], input[type="number"], input[type="email"], input[type="date"], select {
            width: 100%;
            padding: 12px;
            border-radius: 24px;
            border: none;
            background: #334155;
            color: white;
            font-size: 14px;
            outline: none;
        }
        .stars { display: flex; gap: 10px; font-size: 32px; cursor: pointer; justify-content: center; margin: 10px 0; }
        .star { color: #475569; transition: 0.1s; }
        .star.selected { color: #fbbf24; text-shadow: 0 0 4px gold; }
        button { width: 100%; padding: 14px; background: linear-gradient(135deg, #a855f7, #3b82f6); border: none; border-radius: 40px; font-size: 18px; font-weight: bold; color: white; cursor: pointer; margin-top: 10px; }
        button:active { transform: scale(0.98); }
        .result { margin-top: 30px; background: #0f172a; border-radius: 24px; padding: 20px; display: none; }
        .result h3 { color: #c084fc; margin-top: 20px; border-left: 4px solid #c084fc; padding-left: 12px; }
        .swot-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 10px;
        }
        .swot-card {
            background: #1e293b;
            border-radius: 20px;
            padding: 12px;
            border-top: 4px solid;
        }
        .swot-card h4 { margin-bottom: 8px; font-size: 16px; }
        .swot-card p { font-size: 13px; line-height: 1.4; }
        .strength-card { border-color: #22c55e; }
        .weakness-card { border-color: #ef4444; }
        .opportunity-card { border-color: #3b82f6; }
        .threat-card { border-color: #f97316; }
        .loading { display: none; text-align: center; margin-top: 15px; }
        hr { border-color: #334155; margin: 15px 0; }
        /* Modal styles - fixed gap and wrapping */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.8);
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background: #1e293b;
            margin: 20px;
            padding: 20px;
            border-radius: 32px;
            max-width: 550px;
            width: 90%;
            max-height: 85%;
            overflow-y: auto;
            border: 1px solid #a855f7;
        }
        .modal-question {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 15px;
            color: #c084fc;
        }
        .modal-question small { font-size: 12px; color: #94a3b8; display: block; margin-top: 5px; }
        .checkbox-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 20px;
        }
        /* Fixed: no extra gap, normal text spacing */
        .checkbox-group label {
            display: flex;
            align-items: baseline;
            gap: 8px;
            font-size: 15px;
            line-height: 1.4;
            white-space: normal;
            word-break: normal;
            overflow-wrap: normal;
            width: 100%;
            margin: 0;
        }
        .checkbox-group input {
            flex-shrink: 0;
            margin: 0;
            width: 18px;
            height: 18px;
        }
        .modal-buttons { display: flex; gap: 10px; justify-content: flex-end; margin-top: 10px; }
        .modal-buttons button { width: auto; padding: 8px 16px; margin-top: 0; }
        .alignment-scale { display: flex; flex-wrap: wrap; justify-content: space-between; margin-top: 5px; font-size: 11px; color: #94a3b8; }
        .reload-btn { background: #334155; margin-top: 20px; }
        .disclaimer {
            background: rgba(0,0,0,0.4);
            border-left: 4px solid #f97316;
            padding: 12px;
            border-radius: 16px;
            margin: 20px 0 10px 0;
            font-size: 12px;
            color: #facc15;
            text-align: center;
        }
        .astrology-card {
            background: #1e293b;
            border-radius: 20px;
            padding: 12px;
            margin: 15px 0;
            border-left: 4px solid #fbbf24;
            font-size: 13px;
        }
        .college-table { overflow-x: auto; }
        .college-table table { width: 100%; border-collapse: collapse; background: #1e293b; border-radius: 16px; }
        .college-table th, .college-table td { padding: 10px; text-align: left; border-bottom: 1px solid #334155; }
        .college-table th { background: #0f172a; color: #c084fc; }
        .pdf-btn { background: #334155; margin-top: 20px; }
        @media print {
            body { background: white; color: black; }
            .container { background: white; box-shadow: none; padding: 0; }
            .form-group, .stars, button:not(.pdf-btn), .loading, .modal, .sub { display: none; }
            .result { display: block !important; background: white; color: black; }
            .result h3 { color: #2c3e66; }
            .swot-card, .astrology-card, .college-table table { background: #f0f0f0; color: black; }
            .pdf-btn { display: block; }
        }
    </style>
</head>
<body>
<div class="container">
    <h1>🧠 Neural Path 2.0</h1>
    <div class="sub">Complete Career Roadmap</div>

    <form id="parentForm">
        <div class="form-group"><label class="main-label">👨‍👩 Parent/Guardian Name</label><input type="text" id="parentName" required placeholder="e.g., Rajesh Sharma"></div>
        <div class="form-group"><label class="main-label">Relationship to Child</label>
            <select id="relationship" required><option value="">Select</option><option value="Father">Father</option><option value="Mother">Mother</option><option value="Guardian">Guardian</option></select>
        </div>
        <div class="form-group"><label class="main-label">👶 Child's Full Name</label><input type="text" id="childName" required placeholder="e.g., Aryan Sharma"></div>
        <div class="form-group"><label class="main-label">1. Child's Date of Birth (DOB)</label><input type="date" id="dob" required></div>
        <div class="form-group"><label class="main-label">2. Height (cm) & Weight (kg)</label>
            <div style="display: flex; gap: 10px;"><input type="number" id="height" placeholder="Height (cm)" style="width:50%"><input type="number" id="weight" placeholder="Weight (kg)" style="width:50%"></div>
        </div>
        <div class="form-group"><label class="main-label">3. Favorite Activities / Subjects</label><button type="button" class="custom-select-btn" id="interestsBtn">Select options...</button><input type="hidden" id="interests" value=""></div>
        <div class="form-group"><label class="main-label">4. Extra Curricular Activities</label><button type="button" class="custom-select-btn" id="extracurricularBtn">Select options...</button><input type="hidden" id="extracurricular" value=""></div>
        <div class="form-group"><label class="main-label">5. Favorite TV Show / Web Series</label><input type="text" id="tvshow" placeholder="e.g., Shark Tank"></div>
        <div class="form-group"><label class="main-label">6. Strengths</label><button type="button" class="custom-select-btn" id="strengthsBtn">Select options...</button><input type="hidden" id="strengths" value=""></div>
        <div class="form-group"><label class="main-label">7. Weaknesses</label><button type="button" class="custom-select-btn" id="weaknessesBtn">Select options...</button><input type="hidden" id="weaknesses" value=""></div>
        <div class="form-group"><label class="main-label">8. Mental Condition</label><button type="button" class="custom-select-btn" id="mentalBtn">Select options...</button><input type="hidden" id="mental" value=""></div>
        <div class="form-group"><label class="main-label">9. Physical Health</label><button type="button" class="custom-select-btn" id="physicalBtn">Select options...</button><input type="hidden" id="physical" value=""></div>
        <div class="form-group"><label class="main-label">10. Annual Budget (₹ per year)</label>
            <select id="budget" required><option value="">Select</option><option value="100000">Less than ₹1 lakh</option><option value="300000">₹1 lakh - ₹3 lakh</option><option value="500000">₹3 lakh - ₹5 lakh</option><option value="800000">₹5 lakh - ₹8 lakh</option><option value="1200000">₹8 lakh - ₹12 lakh</option><option value="2000000">Above ₹12 lakh</option></select>
        </div>
        <div class="form-group"><label class="main-label">11. City / State</label><input type="text" id="city" required placeholder="e.g., Delhi"></div>
        <div class="form-group"><label class="main-label">12. Long Term Goal</label><button type="button" class="custom-select-btn" id="goalBtn">Select options...</button><input type="hidden" id="goal" value=""></div>
        <div class="form-group"><label class="main-label">13. Parent-Child Agreement Level (1-10)</label>
            <select id="alignment" required><option value="">Select</option><option value="1">1 – Complete disagreement (opposite goals)</option><option value="2">2 – Mostly disagree</option><option value="3">3 – Slight disagreement</option><option value="4">4 – Slightly agree but confused</option><option value="5">5 – Neutral / no clear agreement</option><option value="6">6 – Somewhat agree</option><option value="7">7 – Mostly agree</option><option value="8">8 – Strongly agree</option><option value="9">9 – Almost perfect match</option><option value="10">10 – Perfect agreement (same vision)</option></select>
            <div class="alignment-scale">💡 1 = completely different goals | 10 = same vision</div>
        </div>
        <div class="form-group"><label class="main-label">📧 Parent's Email (to receive report)</label><input type="email" id="parentEmail" placeholder="parent@example.com" required></div>
        <div class="form-group"><label class="main-label">⭐ Rate this app</label>
            <div class="stars" id="starRating"><span class="star" data-value="1">☆</span><span class="star" data-value="2">☆</span><span class="star" data-value="3">☆</span><span class="star" data-value="4">☆</span><span class="star" data-value="5">☆</span></div>
            <input type="hidden" id="ratingValue" value="0">
        </div>
        <div class="disclaimer">⚠️ <strong>Disclaimer:</strong> This is an AI-generated approximate analysis. Use as reference only.</div>
        <button type="button" onclick="submitAndGenerate()">✨ Generate Complete Report ✨</button>
    </form>
    <div class="loading" id="loading">⏳ Generating roadmap...</div>
    <div id="result" class="result"></div>
</div>

<!-- Modal -->
<div id="modal" class="modal"><div class="modal-content"><div id="modalQuestion" class="modal-question"></div><div id="modalCheckboxes" class="checkbox-group"></div><div class="modal-buttons"><button id="modalCancel">Cancel</button><button id="modalSave">Save</button></div></div></div>

<script>
    // All multiple-select fields with full text (no breaks)
    const fieldsConfig = {
        interests: {
            label: "3. Favorite Activities / Subjects",
            options: ["Gaming & Computers", "Coding & Programming", "Drawing & Design", "Sports & Physical", "Reading & Writing", "Maths & Logic", "Science & Experiments", "Music & Arts", "Business & Management"]
        },
        extracurricular: {
            label: "4. Extra Curricular Activities",
            options: ["Sports (Cricket/Football)", "Chess / Board Games", "Music / Dance", "Coding Club / Robotics", "Debate / Drama", "Art & Craft", "Volunteering / Social Work"]
        },
        strengths: {
            label: "6. Strengths",
            options: ["Problem Solving", "Creative Thinking", "Leadership", "Hard Working", "Quick Learner", "Good Memory", "Team Player"]
        },
        weaknesses: {
            label: "7. Weaknesses",
            options: ["Public Speaking Fear", "Lack of Discipline", "Weak in Maths", "Poor Writing Skills", "Low Confidence", "Delays Tasks / Postpones"]
        },
        mental: {
            label: "8. Mental Condition",
            options: ["Anxious / Worried", "Low Confidence", "Stressed Often", "Happy & Calm", "Short Temper"]
        },
        physical: {
            label: "9. Physical Health",
            options: ["Eye Sight Issue", "Obesity / Weight", "Low Stamina", "Fit & Active", "Frequent Sickness"]
        },
        goal: {
            label: "12. Long Term Goal",
            options: ["Settle Abroad", "Start My Own Business", "Stable Government Job", "High Paying Private Job", "Become a Researcher/Scientist"]
        }
    };

    let currentModalField = null;
    function openModal(fieldId) {
        currentModalField = fieldId;
        const config = fieldsConfig[fieldId];
        const modal = document.getElementById('modal');
        const questionDiv = document.getElementById('modalQuestion');
        const checkboxesDiv = document.getElementById('modalCheckboxes');
        questionDiv.innerHTML = `${config.label} <small>(select one or more)</small>`;
        let hiddenValue = document.getElementById(fieldId).value;
        let selectedArr = hiddenValue ? hiddenValue.split(", ") : [];
        checkboxesDiv.innerHTML = "";
        config.options.forEach(opt => {
            let isChecked = selectedArr.includes(opt);
            let label = document.createElement('label');
            let cb = document.createElement('input');
            cb.type = 'checkbox';
            cb.value = opt;
            cb.checked = isChecked;
            label.appendChild(cb);
            label.appendChild(document.createTextNode(opt));
            checkboxesDiv.appendChild(label);
        });
        modal.style.display = 'flex';
    }
    function saveModal() {
        if (!currentModalField) return;
        const checkboxes = document.querySelectorAll('#modalCheckboxes input[type="checkbox"]');
        let selected = [];
        checkboxes.forEach(cb => { if (cb.checked) selected.push(cb.value); });
        let selectedStr = selected.join(", ");
        document.getElementById(currentModalField).value = selectedStr;
        let btn = document.getElementById(currentModalField + "Btn");
        if (selectedStr) btn.innerText = selectedStr; else btn.innerText = "Select options...";
        closeModal();
    }
    function closeModal() { document.getElementById('modal').style.display = 'none'; currentModalField = null; }
    for (let fieldId in fieldsConfig) { let btn = document.getElementById(fieldId + "Btn"); if (btn) btn.addEventListener('click', () => openModal(fieldId)); }
    document.getElementById('modalSave').addEventListener('click', saveModal);
    document.getElementById('modalCancel').addEventListener('click', closeModal);
    window.onclick = function(event) { let modal = document.getElementById('modal'); if (event.target === modal) closeModal(); };

    let stars = document.querySelectorAll('.star');
    let ratingInput = document.getElementById('ratingValue');
    stars.forEach(star => {
        star.addEventListener('click', function() {
            let value = parseInt(this.getAttribute('data-value'));
            ratingInput.value = value;
            stars.forEach((s, idx) => { if(idx < value) { s.innerHTML = '★'; s.classList.add('selected'); } else { s.innerHTML = '☆'; s.classList.remove('selected'); } });
        });
    });
    function getHiddenValue(id) { let val = document.getElementById(id).value; return val; }
    function calculateAge(dob) { let birthDate = new Date(dob); let today = new Date(); let age = today.getFullYear() - birthDate.getFullYear(); let m = today.getMonth() - birthDate.getMonth(); if (m < 0 || (m === 0 && today.getDate() < birthDate.getDate())) age--; return age; }
    function getZodiacSign(dob) { let date = new Date(dob); let month = date.getMonth() + 1, day = date.getDate(); if ((month == 1 && day >= 20) || (month == 2 && day <= 18)) return "Aquarius"; if ((month == 2 && day >= 19) || (month == 3 && day <= 20)) return "Pisces"; if ((month == 3 && day >= 21) || (month == 4 && day <= 19)) return "Aries"; if ((month == 4 && day >= 20) || (month == 5 && day <= 20)) return "Taurus"; if ((month == 5 && day >= 21) || (month == 6 && day <= 20)) return "Gemini"; if ((month == 6 && day >= 21) || (month == 7 && day <= 22)) return "Cancer"; if ((month == 7 && day >= 23) || (month == 8 && day <= 22)) return "Leo"; if ((month == 8 && day >= 23) || (month == 9 && day <= 22)) return "Virgo"; if ((month == 9 && day >= 23) || (month == 10 && day <= 22)) return "Libra"; if ((month == 10 && day >= 23) || (month == 11 && day <= 21)) return "Scorpio"; if ((month == 11 && day >= 22) || (month == 12 && day <= 21)) return "Sagittarius"; return "Capricorn"; }
    function getAstrologySuggestion(zodiac) { let s = { "Aries":"Entrepreneurship, sports, army", "Taurus":"Finance, banking, music", "Gemini":"Media, coding, teaching", "Cancer":"Psychology, healthcare", "Leo":"Acting, politics, management", "Virgo":"Data science, research", "Libra":"Law, design, diplomacy", "Scorpio":"Psychology, finance, surgery", "Sagittarius":"Travel, sports coaching", "Capricorn":"Engineering, corporate", "Aquarius":"AI, social work", "Pisces":"Arts, nursing" }; return s[zodiac] || "Hard work brings success."; }

    // College recommendations (unchanged)
    function getCollegeRecommendations(careerPath, budget, city) {
        let recommendationsHTML = "";
        let path = careerPath.toUpperCase();
        let budgetVal = parseInt(budget);
        let isBudgetLow = budgetVal < 300000;
        function buildCollegeRow(collegeName, timeline, eligibility, cutoff) {
            return `<tr style="border-bottom: 1px solid #334155;">
                        <td style="padding: 10px; font-weight: bold;">${collegeName}</td>
                        <td style="padding: 10px;">${timeline}</td>
                        <td style="padding: 10px;">${eligibility}</td>
                        <td style="padding: 10px;">${cutoff}</td>
                      </td>`;
        }
        recommendationsHTML = `<div class="college-table"><table style="width:100%"><thead><tr style="background:#0f172a; color:#c084fc;"><th>College / Institute</th><th>🗓️ Admission Timeline</th><th>📝 Eligibility & Selection</th><th>🎯 Expected/Previous Year Cutoff</th></tr></thead><tbody>`;
        if (path.includes("AI") || path.includes("SOFTWARE") || path.includes("COMPUTER")) {
            recommendationsHTML += buildCollegeRow("IITs (via JEE Advanced)","Registration: Apr 23 - May 2, 2025","Top 2,50,000 JEE Main rankers; 75% in Class 12","~88-90 percentile in JEE Main");
            recommendationsHTML += buildCollegeRow("NITs (via JEE Main)","Exam: Jan/Feb & Apr 2025","75% in Class 12; JEE Main score","CSE at NIT Delhi: Closing rank ~8,971");
            recommendationsHTML += buildCollegeRow("IIIT Hyderabad (UGEE)","Exam: May 2025","Class 12 PCM; UGEE exam","UGEE rank 62-255 (Gen)");
            recommendationsHTML += buildCollegeRow("BITS Pilani (BITSAT)","Application: Dec 2024 - Mar 2025","Class 12 PCM; BITSAT score","Pilani CSE: ~304 marks");
            recommendationsHTML += buildCollegeRow("VIT Vellore (VITEEE)","Application: Nov 2024 - Apr 2025","Class 12 PCM; VITEEE rank","CSE Core: Rank ~548 in Category 1");
            if (isBudgetLow) recommendationsHTML += `<tr><td colspan="4" style="background:#334155;">✅ Budget-friendly: NITs, state colleges, IIT Madras BS Degree, online degrees.</td></tr>`;
        } else if (path.includes("DESIGN")) {
            recommendationsHTML += buildCollegeRow("NID (Ahmedabad)","Prelims: Jan 2026; Mains: Apr-May 2026","Class 12; DAT Prelims + Mains","Merit based on DAT");
            recommendationsHTML += buildCollegeRow("NIFT (Delhi)","Application: Nov 2024 - Jan 2025","Class 12; GAT + CAT","Closing rank ~62-74 (Gen)");
            recommendationsHTML += buildCollegeRow("IIT Bombay IDC (UCEED)","Registration: Mar 10-27, 2025","UCEED exam; Class 12","Valid UCEED score + portfolio");
        } else if (path.includes("SPORTS")) {
            recommendationsHTML += buildCollegeRow("LNIPE Gwalior","June-July 2025","Class 12; Physical tests","Top 10% in fitness tests");
            recommendationsHTML += buildCollegeRow("University of Delhi (Sports Quota)","June-July 2025","Class 12; Sports trials","95%+ in national-level sports");
            recommendationsHTML += buildCollegeRow("NIS Patiala","March-May 2025","Class 12; SAI trials","National-level participation preferred");
        } else if (path.includes("ENTREPRENEUR")) {
            recommendationsHTML += buildCollegeRow("IIMs (IPM)","IPMAT: April-May 2025","Class 12 60%; IPMAT + WAT + PI","IPMAT cutoff ~90-95 percentile");
            recommendationsHTML += buildCollegeRow("NMIMS (Anil Surendra Modi)","NPAT: Dec 2024 - May 2025","Class 12 60%; NPAT + PI","NPAT cutoff ~95-99 percentile");
            recommendationsHTML += buildCollegeRow("Christ University","CUET: Feb-April 2025","Class 12; CUET + PI","CUET score ~650+ (out of 800)");
        } else {
            recommendationsHTML += buildCollegeRow("University of Delhi","May-June 2025","Class 12 45-60%","Cutoffs 90-99% for popular courses");
            recommendationsHTML += buildCollegeRow("Mumbai University","May-June 2025","Class 12 45-60%","Cutoffs vary by college");
        }
        recommendationsHTML += `</tbody></table></div><br><small style="color:#94a3b8;">*Cutoffs are approximate; aim higher.</small>`;
        let cityUpper = city.toUpperCase();
        if (cityUpper.includes("DELHI")) recommendationsHTML += `<br><div style="margin-top:10px;"><strong>📍 Local (Delhi-NCR):</strong> DTU, NSUT, IIIT Delhi, JMI, Amity.</div>`;
        else if (cityUpper.includes("MUMBAI")) recommendationsHTML += `<br><div style="margin-top:10px;"><strong>📍 Local (Mumbai):</strong> VJTI, SPCE, NMIMS, Mumbai University.</div>`;
        else if (cityUpper.includes("BANGALORE")) recommendationsHTML += `<br><div style="margin-top:10px;"><strong>📍 Local (Bangalore):</strong> RVCE, PESIT, Christ, Jain University.</div>`;
        else if (cityUpper.includes("PUNE")) recommendationsHTML += `<br><div style="margin-top:10px;"><strong>📍 Local (Pune):</strong> COEP, VIT Pune, Symbiosis, MIT.</div>`;
        return recommendationsHTML;
    }

    // Helper functions (same as before)
    function getGrowthRoadmap(careerPath, age, childName) {
        let roadmap = `<ul style="margin-left:20px;">`;
        if (careerPath.includes("Software") || careerPath.includes("AI")) {
            roadmap += `<li><strong>Age ${age} - ${Math.min(age+2,18)}:</strong> Learn basics of coding (Python/JavaScript), participate in coding competitions, build small projects.</li>
                        <li><strong>Age ${Math.min(age+2,18)} - ${Math.min(age+4,20)}:</strong> Prepare for JEE/boards; master DSA; start competitive programming.</li>
                        <li><strong>Age ${Math.min(age+4,20)} - ${Math.min(age+6,22)}:</strong> Join B.Tech CSE/AI; do internships; build GitHub portfolio.</li>
                        <li><strong>After ${Math.min(age+6,22)}:</strong> Apply for jobs at top tech companies or pursue MS abroad.</li>`;
        } else if (careerPath.includes("Design")) {
            roadmap += `<li><strong>Age ${age} - ${Math.min(age+2,18)}:</strong> Practice sketching, learn design software (Figma, Adobe).</li>
                        <li><strong>Age ${Math.min(age+2,18)} - ${Math.min(age+4,20)}:</strong> Prepare for UCEED/NID DAT; create portfolio.</li>
                        <li><strong>After ${Math.min(age+4,20)}:</strong> Join design college; work on live projects; apply for UX roles.</li>`;
        } else if (careerPath.includes("Sports")) {
            roadmap += `<li><strong>Age ${age} - ${Math.min(age+2,18)}:</strong> Join professional coaching; participate in district/state tournaments.</li>
                        <li><strong>Age ${Math.min(age+2,18)} - ${Math.min(age+4,20)}:</strong> Prepare for sports quota in colleges; maintain fitness.</li>
                        <li><strong>After ${Math.min(age+4,20)}:</strong> Pursue B.P.Ed or sports management; aim for national teams.</li>`;
        } else {
            roadmap += `<li><strong>Age ${age} - ${Math.min(age+2,18)}:</strong> Focus on academics and soft skills.</li>
                        <li><strong>Age ${Math.min(age+2,18)} - ${Math.min(age+4,20)}:</strong> Prepare for entrance exams (CUET/CLAT/IPMAT).</li>
                        <li><strong>After ${Math.min(age+4,20)}:</strong> Choose relevant degree; build industry connections.</li>`;
        }
        roadmap += `</ul><p><em>This is a sample roadmap – adjust based on personal progress.</em></p>`;
        return roadmap;
    }

    function getSkillGapAnalysis(strengths, weaknesses, careerPath) {
        let gap = `<div><strong>Strengths you have:</strong> ${strengths || "Not specified"}<br>
                   <strong>Weaknesses identified:</strong> ${weaknesses || "Not specified"}<br><br>
                   <strong>Recommended action plan to close gaps:</strong><ul>`;
        if (weaknesses.includes("Public Speaking Fear")) gap += `<li>Join Toastmasters or record daily 1-min selfie video.</li>`;
        if (weaknesses.includes("Delays Tasks") || weaknesses.includes("Postpones")) gap += `<li>Use Pomodoro technique (25 min work, 5 min break) and daily checklists.</li>`;
        if (weaknesses.includes("Lack of Discipline")) gap += `<li>Create a fixed daily schedule with apps like Google Calendar.</li>`;
        if (weaknesses.includes("Low Confidence")) gap += `<li>Celebrate small wins; maintain a success journal.</li>`;
        if (weaknesses.includes("Weak in Maths") && (careerPath.includes("Software") || careerPath.includes("AI"))) gap += `<li>Take foundational math courses (Khan Academy, NCERT) – spend 1 hour daily.</li>`;
        if (!weaknesses.includes("Public Speaking Fear") && !weaknesses.includes("Delays Tasks") && !weaknesses.includes("Postpones")) gap += `<li>No major skill gaps – focus on advanced certifications.</li>`;
        gap += `</ul></div>`;
        return gap;
    }

    function getScholarshipSuggestions(careerPath, budget, city) {
        let suggestions = `<ul>`;
        if (parseInt(budget) < 300000) {
            suggestions += `<li>🎓 <strong>National Scholarship Portal (NSP):</strong> Apply for pre-matric/post-matric scholarships.</li>
                            <li>🎓 <strong>LIC HFL Vidhyadhan Scholarship</strong> – for students with family income < ₹6L.</li>
                            <li>🎓 <strong>Central Sector Scholarship Scheme</strong> – for top 10,000 students in board exams.</li>`;
        } else {
            suggestions += `<li>🏅 <strong>Merit-cum-Means Scholarship</strong> – by colleges (IITs, NITs, BITS).</li>
                            <li>🏅 <strong>Google Anita Borg Memorial Scholarship</strong> – for women in tech.</li>
                            <li>🏅 <strong>Aditya Birla Scholarship</strong> – for top performers in entrance exams.</li>`;
        }
        if (careerPath.includes("Sports")) suggestions += `<li>⚽ <strong>Khelo India Scholarship</strong> – for young athletes (₹5L per year).</li>`;
        if (careerPath.includes("Design")) suggestions += `<li>🎨 <strong>NIFT/NID Merit Scholarships</strong> – based on entrance rank.</li>`;
        suggestions += `</ul><p>Check state government websites for additional scholarships.</p>`;
        return suggestions;
    }

    function getEntranceExamPlanner(careerPath, age) {
        let planner = `<ul>`;
        if (careerPath.includes("Software") || careerPath.includes("AI")) {
            planner += `<li><strong>JEE Main:</strong> Usually April & June (Session 1 & 2). Register by Dec/Jan.</li>
                        <li><strong>JEE Advanced:</strong> Held in May/June. For top 2.5 lakh JEE Main rankers.</li>
                        <li><strong>BITSAT:</strong> May-June. Application opens Dec.</li>
                        <li><strong>VITEEE:</strong> April. Application Nov-Mar.</li>
                        <li><strong>CUET (for DU, BHU etc.):</strong> May-June. Register by March.</li>`;
        } else if (careerPath.includes("Design")) {
            planner += `<li><strong>UCEED (for IIT Design):</strong> January exam; register by Oct.</li>
                        <li><strong>NID DAT:</strong> Prelims Jan, Mains Apr-May. Register by Sep.</li>
                        <li><strong>NIFT entrance:</strong> February exam; application Nov-Dec.</li>`;
        } else if (careerPath.includes("Entrepreneur")) {
            planner += `<li><strong>IPMAT (IIM Indore/Rohtak):</strong> April-May; register by Feb.</li>
                        <li><strong>CUET (for BBA/B.Com):</strong> May-June; register by March.</li>
                        <li><strong>NPAT (NMIMS):</strong> Dec-May (multiple slots).</li>`;
        } else {
            planner += `<li><strong>CUET (central universities):</strong> May-June.</li>
                        <li><strong>CLAT (law):</strong> December; register by Oct.</li>
                        <li><strong>State CETs (like MHCET, KCET):</strong> April-May.</li>`;
        }
        planner += `</ul><p><strong>Tip:</strong> Start preparing at least 18 months before target exam.</p>`;
        return planner;
    }

    function getTopCompanies(careerPath) {
        let companies = `<ul>`;
        if (careerPath.includes("Software") || careerPath.includes("AI")) {
            companies += `<li>Google, Microsoft, Amazon, Adobe, Flipkart, Ola, Uber, Razorpay, Zeta</li>
                          <li>Startups: Unacademy, Dream11, Postman, Groww</li>`;
        } else if (careerPath.includes("Design")) {
            companies += `<li>Figma, Adobe, Microsoft, Google (UX teams), Tata Elxsi, InfoEdge (Naukri.com)</li>
                          <li>Design studios: Elephant Design, Talented, FoxyMoron</li>`;
        } else if (careerPath.includes("Sports")) {
            companies += `<li>BCCI, IPL franchises, Decathlon, Nike, Adidas, Puma, Sportskeeda</li>`;
        } else if (careerPath.includes("Entrepreneur")) {
            companies += `<li>Self-venture, VC firms, consulting (McKinsey, BCG), large corporates (Tata, Reliance)</li>`;
        } else {
            companies += `<li>Infosys, TCS, Wipro, Deloitte, KPMG, HDFC Bank, Amazon (non-tech)</li>`;
        }
        companies += `</ul>`;
        return companies;
    }

    function getIndustryTrendAnalysis(careerPath) {
        let trend = `<div>`;
        if (careerPath.includes("Software") || careerPath.includes("AI")) {
            trend += `<p>📈 <strong>Growth forecast 2030-2035:</strong> AI/ML jobs expected to grow by 30-40% in India. Demand for prompt engineers, AI ethicists, data scientists will rise. Automation may reduce entry-level coding jobs, but problem-solving and AI integration skills will be premium.</p>`;
        } else if (careerPath.includes("Design")) {
            trend += `<p>🎨 <strong>Growth forecast:</strong> UX/UI design demand increasing due to digital transformation. Companies investing in user experience. Rise of generative AI tools (Midjourney, DALL·E) – designers will need to co-create with AI.</p>`;
        } else if (careerPath.includes("Sports")) {
            trend += `<p>⚽ <strong>Growth forecast:</strong> Sports management and analytics growing fast in India (IPL, Pro Kabaddi). Jobs in sports marketing, event management, data analytics.</p>`;
        } else if (careerPath.includes("Entrepreneur")) {
            trend += `<p>🚀 <strong>Growth forecast:</strong> Startup ecosystem booming (India has 3rd largest startup hub). Government schemes (Startup India) support entrepreneurship. Future lies in green energy, edtech, healthtech, and AI-first startups.</p>`;
        } else {
            trend += `<p>📊 <strong>Growth forecast:</strong> Traditional jobs are evolving with digital skills. Upskilling in data analysis, digital marketing, and AI tools will be essential for career growth.</p>`;
        }
        trend += `</div>`;
        return trend;
    }

    function getWellnessPlan(weaknesses, mental, physical) {
        let plan = `<ul>`;
        if (weaknesses.includes("Public Speaking Fear")) plan += `<li>🎤 Join a local Toastmasters club or practice speaking in front of mirror daily.</li>`;
        if (weaknesses.includes("Delays Tasks") || weaknesses.includes("Postpones")) plan += `<li>⏰ Use Pomodoro timer (Forest app) and break tasks into 15-minute chunks.</li>`;
        if (mental.includes("Anxious") || mental.includes("Stressed")) plan += `<li>🧘 Practice 10-minute mindfulness meditation (apps: Calm, Headspace, or free YouTube).</li>`;
        if (physical.includes("Low Stamina")) plan += `<li>🏃 Start with 20-min daily walk, increase to 30 min cardio 4 times/week.</li>`;
        if (physical.includes("Eye Sight")) plan += `<li>👓 Follow 20-20-20 rule: every 20 min look 20 feet away for 20 seconds.</li>`;
        if (!plan.includes("<li>")) plan += `<li>✅ Maintain a balanced routine – 8 hrs sleep, regular exercise, and time for hobbies.</li>`;
        plan += `</ul><p>Small consistent changes lead to big improvements.</p>`;
        return plan;
    }

    // Main analysis
    function generateAnalysis(age, height, weight, interests, extracurricular, tvshow, strengths, weaknesses, mental, physical, budget, goal, alignment) {
        let careerPath = "";
        if (interests.includes("Coding") || interests.includes("Gaming") || extracurricular.includes("Coding")) careerPath = "AI/ML Software Engineer";
        else if (interests.includes("Drawing") || interests.includes("Design")) careerPath = "UI/UX Designer";
        else if (interests.includes("Sports") || extracurricular.includes("Sports")) { if (height && height > 170) careerPath = "Professional Athlete"; else careerPath = "Sports Management"; }
        else if (interests.includes("Business") || tvshow.includes("Shark Tank")) careerPath = "Entrepreneur";
        else careerPath = "Digital Marketing";
        let S = strengths ? "✅ " + strengths : "✅ Basic strengths";
        let W = weaknesses ? "⚠️ " + weaknesses : "⚠️ No major weakness";
        let O = (parseInt(budget)>=500000) ? "💰 Good budget" : "💰 Limited budget, use free resources";
        let T = mental.includes("Anxious") ? "😟 Stress management needed" : "No major threats";
        return { careerPath, S, W, O, T };
    }

    const SCRIPT_URL = "https://docs.google.com/spreadsheets/d/13I3XJNo_JLPYUO8qW2PS4E-48T-Uqr7saAgSyDbzwDw/edit?gid=0#gid=0";  // Replace with your actual Apps Script URL

    async function submitAndGenerate() {
        let parentName = document.getElementById('parentName').value.trim();
        let relationship = document.getElementById('relationship').value;
        let childName = document.getElementById('childName').value.trim();
        let dob = document.getElementById('dob').value;
        let age = dob ? calculateAge(dob) : "";
        let height = document.getElementById('height').value || "";
        let weight = document.getElementById('weight').value || "";
        let interests = getHiddenValue('interests');
        let extracurricular = getHiddenValue('extracurricular');
        let tvshow = document.getElementById('tvshow').value.trim();
        let strengths = getHiddenValue('strengths');
        let weaknesses = getHiddenValue('weaknesses');
        let mental = getHiddenValue('mental');
        let physical = getHiddenValue('physical');
        let budget = document.getElementById('budget').value;
        let city = document.getElementById('city').value.trim();
        let goal = getHiddenValue('goal');
        let alignment = document.getElementById('alignment').value;
        let parentEmail = document.getElementById('parentEmail').value.trim().toLowerCase();
        let rating = document.getElementById('ratingValue').value;

        if(!parentName || !relationship || !childName || !dob || !budget || !city || !alignment || !parentEmail) {
            alert("Please fill all mandatory fields");
            return;
        }
        if(rating == "0") { alert("Please rate the app"); return; }
        if(!interests || !strengths || !weaknesses || !mental || !physical || !goal) {
            alert("Please select options for all multiple-choice fields (use the buttons)");
            return;
        }

        let zodiac = getZodiacSign(dob);
        let astrologyMsg = getAstrologySuggestion(zodiac);
        let analysis = generateAnalysis(age, height, weight, interests, extracurricular, tvshow, strengths, weaknesses, mental, physical, budget, goal, alignment);
        let skillScore = 50;
        if(strengths.includes("Problem Solving")) skillScore += 15;
        if(weaknesses.includes("Public Speaking Fear")) skillScore -= 10;
        skillScore = Math.min(100, Math.max(20, skillScore));

        let collegeSuggestions = getCollegeRecommendations(analysis.careerPath, budget, city);
        let growthRoadmap = getGrowthRoadmap(analysis.careerPath, age, childName);
        let skillGap = getSkillGapAnalysis(strengths, weaknesses, analysis.careerPath);
        let scholarships = getScholarshipSuggestions(analysis.careerPath, budget, city);
        let examPlanner = getEntranceExamPlanner(analysis.careerPath, age);
        let topCompanies = getTopCompanies(analysis.careerPath);
        let industryTrend = getIndustryTrendAnalysis(analysis.careerPath);
        let wellnessPlan = getWellnessPlan(weaknesses, mental, physical);

        let payload = {
            timestamp: new Date().toISOString(),
            parentName, relationship, childName, dob, age, height, weight, interests, extracurricular, tvshow,
            strengths, weaknesses, mental, physical, budget, city, goal, alignment,
            parentEmail, rating, skillScore, careerPath: analysis.careerPath,
            swot_s: analysis.S, swot_w: analysis.W, swot_o: analysis.O, swot_t: analysis.T,
            zodiac, astrologyMsg
        };

        let loadingDiv = document.getElementById('loading');
        let btn = document.querySelector('button');
        loadingDiv.style.display = 'block';
        btn.disabled = true;

        if(SCRIPT_URL && SCRIPT_URL !== "YOUR_GOOGLE_SCRIPT_URL") {
            try { await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) }); } catch(e) { console.error(e); }
        } else { alert("Google Sheet URL not configured. Data not saved."); }

        let resultDiv = document.getElementById('result');
        resultDiv.style.display = 'block';
        resultDiv.innerHTML = `
            <div id="reportContent">
                <h3>🎯 Skill Score: ${skillScore}/100</h3>
                <h3>🤖 Recommended Career: ${analysis.careerPath}</h3>
                <div class="astrology-card">🌟 <strong>Astrology Insight (${zodiac}):</strong> ${astrologyMsg}<br><small>✨ Traditional belief – not scientific.</small></div>
                <h3>📊 SWOT Analysis</h3>
                <div class="swot-grid">
                    <div class="swot-card strength-card"><h4>💪 Strengths</h4><p>${analysis.S}</p></div>
                    <div class="swot-card weakness-card"><h4>🔻 Weaknesses</h4><p>${analysis.W}</p></div>
                    <div class="swot-card opportunity-card"><h4>🌟 Opportunities</h4><p>${analysis.O}</p></div>
                    <div class="swot-card threat-card"><h4>⚠️ Threats</h4><p>${analysis.T}</p></div>
                </div>
                <h3>🏫 Suggested Colleges / Institutes (with Timelines, Eligibility & Cutoffs)</h3>
                ${collegeSuggestions}
                <h3>📅 5-Year Personalised Growth Roadmap (age-wise)</h3>
                ${growthRoadmap}
                <h3>🧩 Skill Gap Analysis & Action Plan</h3>
                ${skillGap}
                <h3>💰 Scholarship & Financial Aid Suggestions</h3>
                ${scholarships}
                <h3>📝 Entrance Exam Planner (month-wise)</h3>
                ${examPlanner}
                <h3>🏢 Top Companies Hiring for this Career</h3>
                ${topCompanies}
                <h3>📊 Industry Trend Analysis (till 2035)</h3>
                ${industryTrend}
                <h3>🧘 Mental & Physical Wellness Plan</h3>
                ${wellnessPlan}
                <hr>
                <p>✅ Report sent to <strong>${parentEmail}</strong> (if Google Sheet configured).</p>
            </div>
            <button class="pdf-btn" onclick="window.print();">📄 Download as PDF (Print)</button>
            <button class="reload-btn" onclick="location.reload();">🔄 Fill Another Form</button>
        `;
        loadingDiv.style.display = 'none';
        btn.disabled = false;
        resultDiv.scrollIntoView({ behavior: 'smooth' });
    }
</script>
