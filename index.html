<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Neural Path 2.0 - Landing</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: #f1f5f9;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            text-align: center;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 48px;
            padding: 40px 30px;
            max-width: 500px;
            margin: 20px;
            box-shadow: 0 25px 45px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.2);
        }
        h1 {
            font-size: 36px;
            background: linear-gradient(135deg, #a855f7, #3b82f6);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 20px;
        }
        .sub {
            font-size: 16px;
            opacity: 0.8;
            margin-bottom: 30px;
        }
        .qr-box {
            background: white;
            padding: 20px;
            border-radius: 32px;
            display: inline-block;
            margin: 10px auto;
        }
        #qrcode {
            display: flex;
            justify-content: center;
        }
        .info {
            margin-top: 30px;
            font-size: 14px;
            color: #94a3b8;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
</head>
<body>
<div class="container">
    <h1>🧠 NEURAL PATH 2.0</h1>
    <div class="sub">Futuristic Career Agent for Your Child</div>
    <div class="qr-box">
        <div id="qrcode"></div>
    </div>
    <div class="info">📱 Scan this QR code to open the question form<br>and get a complete career roadmap + SWOT analysis</div>
</div>

<script>
    // The QR code should point to the form page.
    // Change the URL below if you host form.html at a different location.
    // For local testing, use relative path: "form.html"
    // For live server, put full URL.
    const formPageUrl = "form.html";  // Change this to your actual form page URL
    window.onload = function() {
        new QRCode(document.getElementById("qrcode"), {
            text: formPageUrl,
            width: 200,
            height: 200,
            colorDark: "#000000",
            colorLight: "#ffffff",
            correctLevel: QRCode.CorrectLevel.H
        });
    };
</script>
</body>
</html>
