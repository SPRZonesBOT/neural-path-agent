<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    
    <!-- PWA Meta Tags -->
    <link rel="manifest" href="https://sprzonesbot.github.io/neural-path-agent/manifest.json">
    <link rel="apple-touch-icon" href="https://sprzonesbot.github.io/neural-path-agent/icon-192.png">
    <meta name="theme-color" content="#a855f7">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Neural Path">
    
    <title>Neural Path 2.0 - PWA</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: #f1f5f9;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            text-align: center;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 48px;
            padding: 40px 30px;
            max-width: 500px;
            margin: 20px;
            box-shadow: 0 25px 45px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.2);
        }
        .app-icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 20px;
            background: linear-gradient(135deg, #a855f7, #3b82f6);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
        }
        h1 {
            font-size: 36px;
            background: linear-gradient(135deg, #a855f7, #3b82f6);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 20px;
        }
        .sub { font-size: 16px; opacity: 0.8; margin-bottom: 30px; }
        .qr-box {
            background: white;
            padding: 20px;
            border-radius: 32px;
            display: inline-block;
            margin: 10px auto;
        }
        #qrcode { display: flex; justify-content: center; }
        .info { margin-top: 30px; font-size: 14px; color: #94a3b8; }
        .install-btn {
            display: inline-block;
            margin-top: 20px;
            padding: 14px 32px;
            background: linear-gradient(135deg, #a855f7, #3b82f6);
            border: none;
            border-radius: 40px;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            text-decoration: none;
        }
        .install-btn:active { transform: scale(0.98); }
        .note {
            margin-top: 20px;
            font-size: 12px;
            background: #1e293b;
            padding: 10px;
            border-radius: 16px;
            color: #cbd5e1;
        }
        @media (display-mode: standalone) {
            .container { margin-top: 0; }
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
</head>
<body>
<div class="container">
    <div class="app-icon">🧠</div>
    <h1>Neural Path 2.0</h1>
    <div class="sub">World's Most Comprehensive AI Career Counselor</div>
    <div class="qr-box">
        <div id="qrcode"></div>
    </div>
    <div class="info">📱 Scan this QR code to open the question form</div>
    
    <!-- Install Button for PWA -->
    <button class="install-btn" id="installBtn" style="display:none;">📲 Install App</button>
    <div class="note">✅ Open in Chrome, click "Add to Home Screen" to install</div>
</div>

<script>
    const formUrl = "https://sprzonesbot.github.io/neural-path-agent/form.html";
    window.onload = function() {
        new QRCode(document.getElementById("qrcode"), {
            text: formUrl,
            width: 200,
            height: 200,
            colorDark: "#000000",
            colorLight: "#ffffff",
            correctLevel: QRCode.CorrectLevel.H
        });
    };

    // Service Worker Registration
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('https://sprzonesbot.github.io/neural-path-agent/sw.js')
            .then(function(reg) {
                console.log('Service Worker registered successfully!');
            })
            .catch(function(err) {
                console.log('Service Worker registration failed: ', err);
            });
    }

    // PWA Install Prompt
    let deferredPrompt;
    window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        document.getElementById('installBtn').style.display = 'block';
    });

    document.getElementById('installBtn').addEventListener('click', async () => {
        if (deferredPrompt) {
            deferredPrompt.prompt();
            const result = await deferredPrompt.userChoice;
            console.log(`User chose to ${result.outcome}`);
            deferredPrompt = null;
            document.getElementById('installBtn').style.display = 'none';
        }
    });
</script>
</body>
</html>
